<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP MDT - TERMINÁL v122</title>
    <style>
        :root {
            --bg-main: #0a0b0d; --bg-panel: #111317;
            --accent: #ffcc00; --danger: #ff4444;
            --warning: #ff8800; --info: #00aaff; --fine: #00ff88; --border: #202124;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100vh; background: var(--bg-main); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* MODAL / ALERT */
        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100000; display: none; justify-content: center; align-items: center; }
        .modal-box { background: #1a0000; border: 4px solid var(--danger); padding: 40px; border-radius: 15px; text-align: center; width: 500px; box-shadow: 0 0 50px rgba(255,0,0,0.5); }

        #mainApp { display: none; height: 100vh; width: 100%; }
        #leftPanel { flex: 3; border-right: 2px solid var(--border); display: flex; flex-direction: column; }
        #rightPanel { flex: 1.2; min-width: 400px; background: var(--bg-panel); display: flex; flex-direction: column; }
        
        /* LAW LIST */
        .law-item { scroll-margin-top: 20px; }
        .law-description { flex: 1; font-size: 15px; color: #fff; }
        .law-description b, .law-description strong { color: var(--accent) !important; font-weight: 900; }
        
        .input-box { background: #000; border: 1px solid #333; color: var(--accent); font-weight: 900; padding: 8px; width: 75px; text-align: center; border-radius: 4px; }
        
        /* PROTOCOL STYLING */
        .protocol-card { background: #000; border: 1px solid var(--border); margin: 10px; padding: 15px; border-radius: 8px; position: relative; }
        .prot-header { color: var(--accent); font-weight: 900; cursor: pointer; text-decoration: underline; text-decoration-color: transparent; transition: 0.2s; display: block; margin-bottom: 5px; }
        .prot-header:hover { text-decoration-color: var(--accent); }
        .prot-sub { color: #fff; font-size: 12px; display: block; margin-bottom: 8px; line-height: 1.3; }
        .status-bar { color: white; padding: 12px; font-weight: 900; text-align: center; margin: 5px 10px; border-radius: 4px; font-size: 12px; text-transform: uppercase; display: none; }
    </style>
</head>
<body>

<div id="modalOverlay">
    <div class="modal-box">
        <h1 style="font-size: 60px; margin: 0;">⚠️</h1>
        <h2 id="modalTitle" style="color:#fff;">UPOZORNĚNÍ</h2>
        <p id="modalMsg" style="color:#ccc; font-size: 18px; margin-bottom: 30px;"></p>
        <button onclick="closeModal()" style="background:var(--accent); color:#000; border:none; padding:15px 40px; font-weight:900; cursor:pointer; border-radius:5px;">ROZUMÍM</button>
    </div>
</div>

<div id="loginOverlay" style="position:fixed; width:100%; height:100%; background:var(--bg-main); z-index:200; display:flex; justify-content:center; align-items:center;">
    <button onclick="login()" style="background:var(--accent); padding:20px 50px; font-weight:900; border:none; border-radius:5px; cursor:pointer;">VSTOUPIT DO EVIDENCE</button>
</div>

<div id="mainApp">
    <div id="leftPanel">
        <div style="padding:20px; background: #16181d;"><input type="text" id="searchInput" placeholder="Hledat..." oninput="render()" style="width:100%; padding:12px; background:#000; border:1px solid #444; color:#fff;"></div>
        <div id="lawsContainer" style="overflow-y:auto; padding:20px; scroll-behavior: smooth;"></div>
    </div>

    <div id="rightPanel">
        <div id="courtAlert" class="status-bar" style="background:var(--warning); color:#000;">⚖️ NUTNO VOLAT SZ (MINIMÁLNÍ SAZBY > 20J)</div>
        <div id="maxAlert" class="status-bar" style="background:var(--danger);">🚫 LIMIT 80 LET PŘEKROČEN</div>
        <div id="caseEntries" style="flex-grow:1; overflow-y:auto;"></div>
        <div style="padding:25px; background:#000;">
            <div style="display:flex; justify-content:space-between; font-size:22px; font-weight:900;">
                <span>CELKEM:</span>
                <span><span id="sumJail" style="color:var(--info)">0</span> J | <span id="sumFine" style="color:var(--fine)">0</span> $</span>
            </div>
            <button onclick="resetCase()" style="width:100%; margin-top:15px; padding:15px; background:var(--info); color:white; border:none; font-weight:900; border-radius:5px;">RESET</button>
        </div>
    </div>
</div>

<script>
    let laws = [];
    let protocol = [];

    function login() { document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('mainApp').style.display = 'flex'; load(); }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    function showAlert(title, msg) { document.getElementById('modalTitle').innerText = title; document.getElementById('modalMsg').innerText = msg; document.getElementById('modalOverlay').style.display = 'flex'; }

    // Funkce pro odrolování na zákon
    function scrollToLaw(id) {
        const el = document.getElementById(id);
        if(el) {
            el.style.display = 'block'; // Otevře kategorii pokud je zavřená
            el.querySelector('.law-content').style.display = 'block';
            el.scrollIntoView({ behavior: 'smooth' });
        }
    }

    function parseLimits(text) {
        const clean = text.toLowerCase();
        let l = { minJ: 0, maxJ: 0, maxF: 0, life: clean.includes("doživotí") };
        const jRange = clean.match(/(\d+)\s*[-–]\s*(\d+)\s*let/);
        const jFromTo = clean.match(/od\s+(\d+)\s+do\s+(\d+)\s+let/);
        if (jRange) { l.minJ = parseInt(jRange[1]); l.maxJ = parseInt(jRange[2]); }
        else if (jFromTo) { l.minJ = parseInt(jFromTo[1]); l.maxJ = parseInt(jFromTo[2]); }
        const fMatch = clean.match(/(\d+)\s*\$/);
        if (fMatch) l.maxF = parseInt(fMatch[1]);
        return l;
    }

    async function load() {
        const res = await fetch('tresty.html?v=' + Date.now());
        const html = await res.text();
        const doc = new DOMParser().parseFromString(html, 'text/html');
        laws = Array.from(doc.querySelectorAll('.law-item')).map(item => ({
            id: item.id || 'unknown',
            title: item.getAttribute('data-title'),
            subs: Array.from(item.querySelectorAll('.sub-line')).map(line => ({
                html: line.innerHTML, text: line.innerText,
                valJ: line.getAttribute('data-fix-jail') || "", valF: line.getAttribute('data-fix-fine') || "",
                isFixJ: line.getAttribute('data-fix-jail') !== null,
                isFixF: line.getAttribute('data-fix-fine') !== null,
                limits: parseLimits(line.innerText)
            }))
        }));
        render();
    }

    function render() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        document.getElementById('lawsContainer').innerHTML = laws.filter(l => l.title.toLowerCase().includes(search)).map((law, lIdx) => `
            <div class="law-item" id="${law.id}">
                <div style="padding:15px; background:#1c1f24; color:var(--accent); font-weight:900; cursor:pointer;" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">${law.title}</div>
                <div class="law-content" style="padding:15px; display:none;">
                    ${law.subs.map((sub, sIdx) => `
                        <div class="row">
                            <div class="law-description">${sub.html}</div>
                            <input type="number" class="input-box" id="j_${lIdx}_${sIdx}" value="${sub.valJ}" ${sub.isFixJ?'disabled':''}>
                            <input type="number" class="input-box" id="f_${lIdx}_${sIdx}" value="${sub.valF}" ${sub.isFixF?'disabled':''}>
                            <button onclick="add(${lIdx}, ${sIdx})" style="background:var(--accent); border:none; padding:10px 15px; font-weight:900; cursor:pointer;">+</button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function add(lIdx, sIdx) {
        const sub = laws[lIdx].subs[sIdx];
        const jail = parseInt(document.getElementById(`j_${lIdx}_${sIdx}`).value) || 0;
        const fine = parseInt(document.getElementById(`f_${lIdx}_${sIdx}`).value) || 0;

        if (jail > sub.limits.maxJ && sub.limits.maxJ > 0) return showAlert("NELEGÁLNÍ TREST", "Trest je nad povolenou sazbu!");
        if (fine > sub.limits.maxF && sub.limits.maxF > 0) return showAlert("NELEGÁLNÍ POKUTA", "Pokuta je nad povolený limit!");
        
        // DOŽIVOTÍ ALERT (OPRAVA)
        if (sub.limits.life) showAlert("DOŽIVOTNÍ TREST", "Pozor! Tento čin obsahuje doživotí. Nutno volat SZ/Soud.");

        protocol.push({ 
            id: Date.now(), 
            lawId: laws[lIdx].id,
            parentTitle: laws[lIdx].title, 
            subText: sub.text, 
            jail, fine, minJ: sub.limits.minJ, life: sub.limits.life 
        });
        updateProtocol();
    }

    function updateProtocol() {
        const totalJ = protocol.reduce((a, b) => a + b.jail, 0);
        const totalMin = protocol.reduce((a, b) => a + b.minJ, 0);

        document.getElementById('caseEntries').innerHTML = protocol.map(p => `
            <div class="protocol-card">
                <span class="prot-header" onclick="scrollToLaw('${p.lawId}')">${p.parentTitle}</span>
                <span class="prot-sub">${p.subText}</span>
                <div style="font-size:20px; font-weight:900;">${p.jail} J | $${p.fine.toLocaleString()}</div>
                <button onclick="remove(${p.id})" style="position:absolute; right:10px; top:10px; background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
            </div>
        `).join('');

        document.getElementById('courtAlert').style.display = (totalMin > 20 || protocol.some(p => p.life)) ? 'block' : 'none';
        document.getElementById('maxAlert').style.display = totalJ > 80 ? 'block' : 'none';
        document.getElementById('sumJail').innerText = totalJ;
        document.getElementById('sumFine').innerText = protocol.reduce((a, b) => a + b.fine, 0).toLocaleString();
    }

    function remove(id) { protocol = protocol.filter(x => x.id !== id); updateProtocol(); }
    function resetCase() { protocol = []; updateProtocol(); }
</script>
</body>
</html>
