<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP MDT - TERMINÁL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="customAlert" class="alert-overlay">
    <div class="alert-box">
        <div class="alert-header">VAROVÁNÍ SYSTÉMU</div>
        <div class="alert-content">
            <div id="alertMsg" class="alert-body"></div>
            <button class="alert-btn" onclick="closeAlert()">OK</button>
        </div>
    </div>
</div>

<div id="loginOverlay">
    <div class="login-card">
        <h1>SASP TERMINÁL</h1>
        <p>SECURE ACCESS GATEWAY</p>
        <button class="login-btn" onclick="login()">VSTOUPIT DO EVIDENCE</button>
        <div class="copyright">© 2026 SASP Nathaniel Hartman</div>
    </div>
</div>

<div class="search-bar">
    <input type="text" id="searchInput" placeholder="Hledat v zákoníku..." oninput="render()">
</div>

<div id="mainApp">
    <div id="leftPanel">
        <div id="lawsContainer"></div>
    </div>

    <div id="rightPanel">
        <h3>AKTUÁLNÍ PŘÍPAD</h3>
        <div class="summary-line">
            CELKEM: <span id="sumJail">0</span> J | <span id="sumFine">$0</span>
        </div>
        <button class="new-case-btn" onclick="newCase()">Nový případ</button>
        <div id="caseEntries"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
