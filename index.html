<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP MDT - TERMINÁL v124</title>
    <style>
        :root {
            --bg-main: #0a0b0d; --bg-panel: #111317;
            --accent: #ffcc00; --danger: #ff4444;
            --warning: #ff8800; --info: #00aaff; --fine: #00ff88; --border: #202124;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100vh; background: var(--bg-main); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* MODAL */
        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100000; display: none; justify-content: center; align-items: center; }
        .modal-box { background: #1a0000; border: 4px solid var(--danger); padding: 40px; border-radius: 15px; text-align: center; width: 500px; }

        #mainApp { display: none; height: 100vh; width: 100%; }
        #leftPanel { flex: 3; border-right: 2px solid var(--border); display: flex; flex-direction: column; }
        #rightPanel { flex: 1.2; min-width: 400px; background: var(--bg-panel); display: flex; flex-direction: column; }
        
        .law-category-header { padding: 15px; background: #1c1f24; color: var(--accent) !important; font-weight: 900; cursor: pointer; border-bottom: 1px solid var(--border); text-transform: uppercase; }
        .law-content { padding: 15px; display: none; background: #111317; }
        
        .row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #1a1c20; }
        .law-description { flex: 1; font-size: 15px; color: #fff; }
        .law-description b, .law-description strong { color: var(--accent) !important; }
        
        .input-box { background: #000; border: 1px solid #333; color: var(--accent); font-weight: 900; padding: 8px; width: 85px; text-align: center; border-radius: 4px; }
        
        .protocol-card { background: #000; border: 1px solid var(--border); margin: 10px; padding: 15px; border-radius: 8px; position: relative; }
        .prot-header { color: var(--accent); font-weight: 900; cursor: pointer; display: block; margin-bottom: 5px; }
        .prot-sub { color: #fff; font-size: 12px; display: block; opacity: 0.8; margin-bottom: 8px; }
        .status-bar { color: white; padding: 12px; font-weight: 900; text-align: center; margin: 5px 10px; border-radius: 4px; display: none; }
    </style>
</head>
<body>

<div id="modalOverlay">
    <div class="modal-box">
        <h1 style="font-size: 60px; margin: 0;">⚠️</h1>
        <h2 id="modalTitle" style="color:#fff;">LIMIT PŘEKROČEN</h2>
        <p id="modalMsg" style="color:#ccc; font-size: 18px; margin-bottom: 30px;"></p>
        <button onclick="closeModal()" style="background:var(--accent); color:#000; border:none; padding:15px 40px; font-weight:900; cursor:pointer; border-radius:5px;">OPRAVIT</button>
    </div>
</div>

<div id="loginOverlay" style="position:fixed; width:100%; height:100%; background:var(--bg-main); z-index:200; display:flex; justify-content:center; align-items:center;">
    <button onclick="login()" style="background:var(--accent); padding:20px 50px; font-weight:900; border:none; border-radius:5px; cursor:pointer;">VSTOUPIT DO EVIDENCE</button>
</div>

<div id="mainApp">
    <div id="leftPanel">
        <div style="padding:20px; background: #16181d; border-bottom: 2px solid var(--border);">
            <input type="text" id="searchInput" placeholder="Hledat..." oninput="render()" style="width:100%; padding:12px; background:#000; border:1px solid #444; color:#fff;">
        </div>
        <div id="lawsContainer" style="overflow-y:auto; padding:20px; scroll-behavior: smooth;"></div>
    </div>

    <div id="rightPanel">
        <div id="courtAlert" class="status-bar" style="background:var(--warning); color:#000;">⚖️ NUTNO VOLAT SZ (MINIMÁLNÍ SAZBY > 20J)</div>
        <div id="maxAlert" class="status-bar" style="background:var(--danger);">🚫 LIMIT 80 LET PŘEKROČEN</div>
        <div id="caseEntries" style="flex-grow:1; overflow-y:auto;"></div>
        <div style="padding:25px; background:#000;">
            <div style="display:flex; justify-content:space-between; font-size:22px; font-weight:900;">
                <span>CELKEM:</span>
                <span><span id="sumJail" style="color:var(--info)">0</span> J | <span id="sumFine" style="color:var(--fine)">0</span> $</span>
            </div>
            <button onclick="resetCase()" style="width:100%; margin-top:15px; padding:18px; background:var(--info); color:white; border:none; font-weight:900; cursor:pointer; border-radius:5px;">NOVÝ PŘÍPAD</button>
        </div>
    </div>
</div>

<script>
    let laws = [];
    let protocol = [];

    function login() { document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('mainApp').style.display = 'flex'; load(); }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    function showAlert(title, msg) { document.getElementById('modalTitle').innerText = title; document.getElementById('modalMsg').innerText = msg; document.getElementById('modalOverlay').style.display = 'flex'; }

    function scrollToLaw(id) {
        const el = document.getElementById(id);
        if(el) {
            el.querySelector('.law-content').style.display = 'block';
            el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }

    // VYLEPŠENÝ PARSER LIMITŮ
    function parseStrictLimits(text) {
        const clean = text.replace(/\s/g, '').toLowerCase();
        let res = { minJ: 0, maxJ: 0, maxF: 0, life: clean.includes("doživotí") };
        
        // Hledání let (jail)
        const jMatch = text.match(/(\d+)\s*[-–]\s*(\d+)\s*let/);
        if(jMatch) { res.minJ = parseInt(jMatch[1]); res.maxJ = parseInt(jMatch[2]); }
        
        // Hledání pokuty (vše před znakem $)
        const fMatches = text.match(/(\d[\d\s]*)\s*\$/g);
        if(fMatches) {
            const values = fMatches.map(m => parseInt(m.replace(/\D/g, '')));
            res.maxF = Math.max(...values);
        }
        return res;
    }

    async function load() {
        const res = await fetch('tresty.html?v=' + Date.now());
        const html = await res.text();
        const doc = new DOMParser().parseFromString(html, 'text/html');
        laws = Array.from(doc.querySelectorAll('.law-item')).map(item => ({
            id: item.id || 'L' + Math.random().toString(36).substr(2, 5),
            title: item.getAttribute('data-title'),
            subs: Array.from(item.querySelectorAll('.sub-line')).map(line => ({
                html: line.innerHTML, text: line.innerText,
                valJ: line.getAttribute('data-fix-jail') || "", valF: line.getAttribute('data-fix-fine') || "",
                isFixJ: line.getAttribute('data-fix-jail') !== null,
                isFixF: line.getAttribute('data-fix-fine') !== null,
                limits: parseStrictLimits(line.innerText)
            }))
        }));
        render();
    }

    function render() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        document.getElementById('lawsContainer').innerHTML = laws.filter(l => l.title.toLowerCase().includes(search)).map((law, lIdx) => `
            <div class="law-item" id="${law.id}" style="margin-bottom:10px; border:1px solid var(--border); border-radius:8px; overflow:hidden;">
                <div class="law-category-header" onclick="const c=this.nextElementSibling; c.style.display=c.style.display==='block'?'none':'block'">${law.title}</div>
                <div class="law-content">
                    ${law.subs.map((sub, sIdx) => `
                        <div class="row">
                            <div class="law-description">${sub.html}</div>
                            <input type="number" class="input-box" id="j_${lIdx}_${sIdx}" value="${sub.valJ}" placeholder="J" ${sub.isFixJ?'disabled':''}>
                            <input type="number" class="input-box" id="f_${lIdx}_${sIdx}" value="${sub.valF}" placeholder="$" ${sub.isFixF?'disabled':''}>
                            <button onclick="add(${lIdx}, ${sIdx})" style="background:var(--accent); border:none; padding:10px 15px; font-weight:900; cursor:pointer; border-radius:4px;">+</button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function add(lIdx, sIdx) {
        const sub = laws[lIdx].subs[sIdx];
        const jail = parseInt(document.getElementById(`j_${lIdx}_${sIdx}`).value) || 0;
        const fine = parseInt(document.getElementById(`f_${lIdx}_${sIdx}`).value) || 0;

        // PŘÍSNÁ KONTROLA
        if (jail > sub.limits.maxJ && sub.limits.maxJ > 0) return showAlert("LIMIT VĚZENÍ", `Maximální sazba je ${sub.limits.maxJ} let.`);
        if (fine > sub.limits.maxF && sub.limits.maxF > 0) return showAlert("LIMIT POKUTY", `Maximální pokuta je $${sub.limits.maxF.toLocaleString()}.`);
        
        if (sub.limits.life) showAlert("DOŽIVOTÍ", "Tento čin vyžaduje soudní řízení (Admin Team).");

        protocol.push({ 
            id: Date.now(), lawId: laws[lIdx].id, parentTitle: laws[lIdx].title, 
            subText: sub.text, jail, fine, minJ: sub.limits.minJ, life: sub.limits.life 
        });
        updateProtocol();
    }

    function updateProtocol() {
        const totalJ = protocol.reduce((a, b) => a + b.jail, 0);
        const totalMin = protocol.reduce((a, b) => a + b.minJ, 0);

        document.getElementById('caseEntries').innerHTML = protocol.map(p => `
            <div class="protocol-card">
                <span class="prot-header" onclick="scrollToLaw('${p.lawId}')">${p.parentTitle}</span>
                <span class="prot-sub">${p.subText}</span>
                <div style="font-size:22px; font-weight:900;">${p.jail} J | $${p.fine.toLocaleString()}</div>
                <button onclick="remove(${p.id})" style="position:absolute; right:15px; top:15px; background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
            </div>
        `).join('');

        document.getElementById('courtAlert').style.display = (totalMin > 20 || protocol.some(p => p.life)) ? 'block' : 'none';
        document.getElementById('maxAlert').style.display = totalJ > 80 ? 'block' : 'none';
        document.getElementById('sumJail').innerText = totalJ;
        document.getElementById('sumFine').innerText = protocol.reduce((a, b) => a + b.fine, 0).toLocaleString();
    }

    function remove(id) { protocol = protocol.filter(x => x.id !== id); updateProtocol(); }
    function resetCase() { protocol = []; updateProtocol(); }
</script>
</body>
</html>
