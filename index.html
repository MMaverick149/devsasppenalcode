<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASP Terminál</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginScreen">
        <h1 class="terminal-title">SASP TERMINÁL</h1>
        <p class="terminal-subtitle">SECURE ACCESS GATEWAY</p>
        <button class="login-btn" onclick="enterEvidence()">VSTOUPIT DO EVIDENCE</button>
    </div>

    <div id="mainContent" class="container" style="display: none;">
        <div class="main-side">
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-bar" placeholder="Hledat v zákoníku (např. §7)..." oninput="render()">
            </div>
            <div id="lawsContainer"></div>
        </div>
        
        <div class="sidebar">
            <div class="sidebar-header">AKTUÁLNÍ PŘÍPAD</div>
            <div id="caseEntries" class="case-list"></div>
            <div class="sidebar-footer">
                <div class="summary">
                    CELKEM: <span id="sumJail">0</span> J | $<span id="sumFine">0</span>
                </div>
                <button class="new-case-btn" onclick="newCase()">NOVÝ PŘÍPAD</button>
            </div>
        </div>
    </div>

    <div id="customAlert" class="alert-overlay" style="display: none;">
        <div class="alert-box">
            <h2 id="alertTitle">VAROVÁNÍ</h2>
            <p id="alertMsg"></p>
            <button class="alert-btn" onclick="closeAlert()">OK</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
