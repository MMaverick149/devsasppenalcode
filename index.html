<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP MDT - TERMINÁL v119</title>
    <style>
        :root {
            --bg-main: #0a0b0d; --bg-panel: #111317;
            --accent: #ffcc00; --danger: #ff4444;
            --warning: #ff8800; --info: #00aaff; --fine: #00ff88; --border: #202124;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100vh; background: var(--bg-main); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 200000; display: flex; justify-content: center; align-items: center; }
        .login-card { background: #111317; padding: 60px 40px; border-radius: 20px; text-align: center; width: 450px; border: 2px solid rgba(255, 204, 0, 0.1); }
        .login-btn { background: var(--accent); color: #000; border: none; padding: 18px 40px; font-weight: 900; cursor: pointer; border-radius: 5px; width: 100%; }

        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100000; display: none; justify-content: center; align-items: center; }
        .modal-box { background: #1a0000; border: 4px solid var(--danger); padding: 40px; border-radius: 15px; text-align: center; width: 500px; }

        #mainApp { display: none; height: 100vh; width: 100%; }
        #leftPanel { flex: 3; border-right: 2px solid var(--border); display: flex; flex-direction: column; }
        #rightPanel { flex: 1.2; min-width: 400px; background: var(--bg-panel); display: flex; flex-direction: column; }
        
        .row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #1a1c20; }
        .law-description { flex: 1; font-size: 15px; color: #ddd; }
        .input-box { background: #000; border: 1px solid #333; color: var(--accent); font-weight: 900; padding: 8px; width: 70px; text-align: center; border-radius: 4px; }
        
        .protocol-card { background: #000; border: 1px solid var(--border); margin: 10px; padding: 15px; border-radius: 8px; position: relative; }
        .status-bar { color: white; padding: 12px; font-weight: 900; text-align: center; margin: 5px 10px; border-radius: 4px; font-size: 12px; text-transform: uppercase; display: none; }
        
        #courtAlert { background: var(--warning); color: #000; }
        #maxAlert { background: var(--danger); color: #fff; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 1; } to { opacity: 0.6; } }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h1 style="color:var(--accent); letter-spacing: 2px;">SASP TERMINÁL</h1>
        <button class="login-btn" onclick="login()">VSTOUPIT DO EVIDENCE</button>
    </div>
</div>

<div id="modalOverlay">
    <div class="modal-box">
        <h1 style="color:var(--danger); font-size: 50px;">⚠️</h1>
        <h2 id="modalTitle" style="color:#fff;">NELEGÁLNÍ TREST</h2>
        <p id="modalMsg" style="color:#ccc; font-size: 18px; margin-bottom: 30px;"></p>
        <button onclick="closeModal()" style="background:var(--danger); color:white; border:none; padding:15px 30px; font-weight:900; cursor:pointer; border-radius:5px;">ROZUMÍM</button>
    </div>
</div>

<div id="mainApp">
    <div id="leftPanel">
        <div style="padding:20px; border-bottom:2px solid var(--border); background: #16181d;">
            <input type="text" id="searchInput" placeholder="Vyhledat v zákoníku (paragraf, název)..." oninput="render()" style="width:100%; background:#000; border:1px solid #444; color:#fff; padding:12px; border-radius: 5px;">
        </div>
        <div id="lawsContainer" style="overflow-y:auto; padding:20px;"></div>
    </div>

    <div id="rightPanel">
        <div style="padding:15px; background:#000; font-size:11px; color:#444;">SASP | EVIDENCE PŘÍPADU</div>
        
        <div id="courtAlert" class="status-bar">⚖️ NUTNO VOLAT SZ (MIN. SAZBA > 20J)</div>
        <div id="maxAlert" class="status-bar">🚫 PŘEKROČEN LIMIT 80 LET</div>
        <div id="warnWeapon" class="status-bar" style="background:var(--danger);">⚠️ ODEBRAT ZBROJNÍ PRŮKAZ</div>
        <div id="warnDriver" class="status-bar" style="background:#ff6600;">⚠️ ODEBRAT ŘIDIČSKÝ PRŮKAZ</div>
        
        <div id="caseEntries" style="flex-grow:1; overflow-y:auto;"></div>
        
        <div style="padding:25px; background:#000; border-top:2px solid var(--border);">
            <div style="display:flex; justify-content:space-between; font-weight:900; margin-bottom:10px;">
                <span>SOUČET MINIM:</span>
                <span id="sumMin" style="color:#777">0 J</span>
            </div>
            <div style="display:flex; justify-content:space-between; font-weight:900; margin-bottom:20px; font-size: 22px;">
                <span>CELKOVÝ TREST:</span>
                <span><span id="sumJail" style="color:var(--info)">0</span> J | <span id="sumFine" style="color:var(--fine)">0</span> $</span>
            </div>
            <button onclick="resetCase()" style="width:100%; padding:18px; background:var(--info); color:white; border:none; font-weight:900; cursor:pointer; border-radius:5px;">NOVÝ PŘÍPAD / RESET</button>
        </div>
    </div>
</div>

<script>
    let laws = [];
    let protocol = [];
    const LIMIT_ZKRACENE = 20; // Limit součtu minimálních sazeb pro zkrácené řízení
    const MAX_TOTAL_JAIL = 80; // Absolutní stopka pro MDT

    function login() { document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('mainApp').style.display = 'flex'; load(); }
    function showModal(title, msg) { 
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMsg').innerText = msg; 
        document.getElementById('modalOverlay').style.display = 'flex'; 
    }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    function resetCase() { protocol = []; updateProtocol(); }

    function parseDualLimits(text) {
        const cleanText = text.replace(/\./g, '').toLowerCase();
        let limits = { jail: { min: 0, max: 0 }, life: false };
        if (cleanText.includes("doživotí")) limits.life = true;

        const jailRange = cleanText.match(/(\d+)\s*[-–至až]\s*(\d+)\s*let/);
        const jailFromTo = cleanText.match(/od\s+(\d+)\s+.*(?:do|na)\s+(\d+)\s+let/);
        
        if (jailRange) { limits.jail.min = parseInt(jailRange[1]); limits.jail.max = parseInt(jailRange[2]); }
        else if (jailFromTo) { limits.jail.min = parseInt(jailFromTo[1]); limits.jail.max = parseInt(jailFromTo[2]); }
        
        return limits;
    }

    async function load() {
        try {
            const res = await fetch('tresty.html?v=' + Date.now());
            const html = await res.text();
            const doc = new DOMParser().parseFromString(html, 'text/html');
            laws = Array.from(doc.querySelectorAll('.law-item')).map(item => ({
                title: item.getAttribute('data-title'),
                subs: Array.from(item.querySelectorAll('.sub-line')).map(line => {
                    const text = line.innerText;
                    const limits = parseDualLimits(text);
                    return {
                        html: line.innerHTML, fullText: text,
                        valJ: line.getAttribute('data-fix-jail') || "", 
                        valF: line.getAttribute('data-fix-fine') || "",
                        isFixJ: line.getAttribute('data-fix-jail') !== null,
                        limits: limits,
                        licW: text.toUpperCase().includes("ZBROJNÍ"), 
                        licD: text.toUpperCase().includes("ŘIDIČSKÝ")
                    };
                })
            }));
            render();
        } catch (e) { console.error(e); }
    }

    function render() {
        const container = document.getElementById('lawsContainer');
        const search = document.getElementById('searchInput').value.toLowerCase();
        container.innerHTML = laws.filter(l => l.title.toLowerCase().includes(search)).map((law, lIdx) => `
            <div style="background:var(--bg-panel); border:1px solid var(--border); margin-bottom:12px; border-radius:8px;">
                <div style="padding:15px; background:#1c1f24; color:var(--accent); font-weight:900; cursor:pointer;" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">${law.title}</div>
                <div style="padding:15px; display:none;">
                    ${law.subs.map((sub, sIdx) => `
                        <div class="row">
                            <div class="law-description">${sub.html}</div>
                            <input type="number" class="input-box" id="j_${lIdx}_${sIdx}" value="${sub.valJ}" placeholder="JAIL">
                            <input type="number" class="input-box" id="f_${lIdx}_${sIdx}" value="${sub.valF}" placeholder="FINE">
                            <button onclick="add(${lIdx}, ${sIdx})" style="background:var(--accent); border:none; padding:10px 15px; border-radius:4px; font-weight:900; cursor:pointer;">+</button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function add(lIdx, sIdx) {
        const sub = laws[lIdx].subs[sIdx];
        const jail = parseInt(document.getElementById(`j_${lIdx}_${sIdx}`).value) || 0;
        const fine = parseInt(document.getElementById(`f_${lIdx}_${sIdx}`).value) || 0;

        if (jail > 0 && !sub.isFixJ && sub.limits.jail.max > 0) {
            if (jail < sub.limits.jail.min || jail > sub.limits.jail.max) {
                showModal("MIMO SAZBU", `Tento paragraf má sazbu ${sub.limits.jail.min}-${sub.limits.jail.max} let.`);
                return;
            }
        }

        protocol.push({ 
            id: Date.now(), title: laws[lIdx].title, jail, fine, 
            minJail: sub.limits.jail.min, life: sub.limits.life,
            licW: sub.licW, licD: sub.licD 
        });
        updateProtocol();
    }

    function updateProtocol() {
        const totalJail = protocol.reduce((a, b) => a + b.jail, 0);
        const sumMinJail = protocol.reduce((a, b) => a + b.minJail, 0);
        const hasLife = protocol.some(p => p.life);

        document.getElementById('caseEntries').innerHTML = protocol.map(p => `
            <div class="protocol-card">
                <div style="color:var(--accent); font-weight:900;">${p.title}</div>
                <div style="font-size:22px; margin-top:5px;">${p.jail} J | $${p.fine.toLocaleString()}</div>
                <button onclick="remove(${p.id})" style="position:absolute; right:15px; top:15px; background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
            </div>
        `).join('');

        // LOGIKA VAROVÁNÍ
        const needsCourt = sumMinJail > LIMIT_ZKRACENE || hasLife;
        const isOverLimit = totalJail > MAX_TOTAL_JAIL;

        document.getElementById('courtAlert').style.display = (needsCourt && !isOverLimit) ? 'block' : 'none';
        document.getElementById('maxAlert').style.display = isOverLimit ? 'block' : 'none';
        document.getElementById('warnWeapon').style.display = protocol.some(p => p.licW) ? 'block' : 'none';
        document.getElementById('warnDriver').style.display = protocol.some(p => p.licD) ? 'block' : 'none';

        document.getElementById('sumMin').innerText = sumMinJail + " J";
        document.getElementById('sumJail').innerText = totalJail;
        document.getElementById('sumFine').innerText = protocol.reduce((a, b) => a + b.fine, 0).toLocaleString();
        
        document.getElementById('sumMin').style.color = sumMinJail > LIMIT_ZKRACENE ? 'var(--warning)' : '#777';
        document.getElementById('sumJail').style.color = isOverLimit ? 'var(--danger)' : 'var(--info)';
    }

    function remove(id) { protocol = protocol.filter(x => x.id !== id); updateProtocol(); }
</script>
</body>
</html>
