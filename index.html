<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP MDT - TERMINÁL v112</title>
    <style>
        :root {
            --bg-main: #0a0b0d; --bg-panel: #111317;
            --accent: #ffcc00; --danger: #ff4444;
            --info: #00aaff; --fine: #00ff88; --border: #202124;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100vh; background: var(--bg-main); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* PŘIHLAŠOVACÍ OBRAZOVKA S PULZUJÍCÍM OKRAJEM */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 200000; display: flex; justify-content: center; align-items: center; }
        
        .login-card { 
            background: #111317; padding: 60px 40px; border-radius: 20px; 
            text-align: center; width: 450px; position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            animation: borderPulse 3s infinite ease-in-out;
            border: 2px solid rgba(255, 204, 0, 0.1);
        }

        @keyframes borderPulse {
            0% { box-shadow: 0 0 15px rgba(255, 204, 0, 0.1); border-color: rgba(255, 204, 0, 0.1); }
            50% { box-shadow: 0 0 35px rgba(255, 204, 0, 0.4); border-color: rgba(255, 204, 0, 0.6); }
            100% { box-shadow: 0 0 15px rgba(255, 204, 0, 0.1); border-color: rgba(255, 204, 0, 0.1); }
        }

        .login-btn { 
            background: var(--accent); color: #000; border: none; padding: 15px 40px; 
            font-weight: 900; cursor: pointer; border-radius: 5px; font-size: 16px; 
            text-transform: uppercase; transition: 0.3s; width: 100%;
        }
        .login-btn:hover { background: #e6b800; transform: scale(1.02); }

        .dev-info { color: #444; font-size: 10px; margin-top: 40px; text-transform: uppercase; letter-spacing: 1px; }

        /* HLAVNÍ APLIKACE */
        #mainApp { display: flex; height: 100vh; width: 100%; display: none; }
        #leftPanel { flex: 3; border-right: 2px solid var(--border); display: flex; flex-direction: column; }
        #rightPanel { flex: 1.2; min-width: 400px; background: var(--bg-panel); display: flex; flex-direction: column; }
        
        .law-description { flex: 1; font-size: 16px; color: #ddd; line-height: 1.5; }
        .law-description b, .law-description strong { color: var(--accent) !important; font-weight: 900 !important; }

        .input-box { 
            background: #000 !important; border: 1px solid #333; 
            color: var(--accent) !important; font-weight: 900; 
            padding: 8px 5px; width: 80px; text-align: center; border-radius: 4px; 
            font-size: 14px; outline: none;
        }

        .row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #1a1c20; }
        .protocol-card { background: #000; border: 1px solid var(--border); margin: 10px; padding: 15px; border-radius: 8px; position: relative; }
        .warning-bar { color: white; padding: 15px; border-radius: 4px; font-weight: 900; text-align: center; margin: 5px 10px; display: none; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h1 style="color:var(--accent); font-size: 32px; margin-bottom: 5px; letter-spacing: 2px;">SASP TERMINÁL</h1>
        <p style="color:#555; font-size: 12px; letter-spacing: 3px; margin-bottom: 40px;">SECURE ACCESS GATEWAY</p>
        
        <div id="credentialsFields" style="display:none; margin-bottom: 20px;">
            <input type="text" id="officerName" placeholder="JMÉNO A PŘÍJMENÍ" style="width:100%; padding:12px; background:#000; border:1px solid #333; color:#fff; margin-bottom:10px; text-align:center;">
            <input type="number" id="officerId" placeholder="SLUŽEBNÍ ČÍSLO" style="width:100%; padding:12px; background:#000; border:1px solid #333; color:#fff; text-align:center;">
        </div>

        <button id="entryBtn" class="login-btn" onclick="showFields()">VSTOUPIT DO EVIDENCE</button>
        <button id="finalLoginBtn" class="login-btn" onclick="login()" style="display:none;">POTVRDIT PŘIHLÁŠENÍ</button>

        <div class="dev-info">
            DEVELOPED BY: Nathaniel Hartman (DC:michal1448) & MDT Team<br>
            © 2026 SASP Nathaniel Hartman
        </div>
    </div>
</div>

<div id="mainApp">
    <div id="leftPanel">
        <div style="padding:20px; border-bottom:2px solid var(--border); background: #16181d;">
            <input type="text" id="searchInput" placeholder="Vyhledat v zákoníku..." oninput="render()" style="width:100%; background:#000; border:1px solid #444; color:#fff; padding:12px;">
        </div>
        <div id="lawsContainer" style="overflow-y:auto; padding:20px;"></div>
    </div>

    <div id="rightPanel">
        <div id="officerTag" style="padding:15px; background:#000; font-size:11px; color:#666; border-bottom:1px solid var(--border); text-transform:uppercase;">OPERÁTOR: -</div>
        <div id="caseEntries" style="flex-grow:1; overflow-y:auto;"></div>
        
        <div id="warnWeapon" class="warning-bar" style="background:var(--danger)">⚠️ ODEBRAT ZBROJNÍ PRŮKAZ</div>
        <div id="warnDriver" class="warning-bar" style="background:#ff6600">⚠️ ODEBRAT ŘIDIČSKÝ PRŮKAZ</div>
        
        <div style="padding:25px; background:#000; border-top:2px solid var(--border);">
            <div style="display:flex; justify-content:space-between; font-weight:900; margin-bottom:20px; font-size: 20px;">
                <span>CELKEM:</span>
                <span><span id="sumJail" style="color:var(--info)">0</span> Vězení | <span id="sumFine" style="color:var(--fine)">0</span> $ Pokuta</span>
            </div>
            <button onclick="location.reload()" style="width:100%; padding:18px; background:var(--info); color:white; border:none; font-weight:900; cursor:pointer; border-radius:5px;">NOVÝ PŘÍPAD</button>
        </div>
    </div>
</div>

<script>
    let laws = [];
    let protocol = [];

    function showFields() {
        document.getElementById('entryBtn').style.display = 'none';
        document.getElementById('credentialsFields').style.display = 'block';
        document.getElementById('finalLoginBtn').style.display = 'block';
    }

    function login() {
        const name = document.getElementById('officerName').value;
        const id = document.getElementById('officerId').value;
        if(name.length > 3 && id.length > 0) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            document.getElementById('officerTag').innerText = `OPERÁTOR: ${name} #${id}`;
        }
    }

    function parseLimits(text) {
        const cleanText = text.replace(/\./g, '').toLowerCase();
        const nums = (cleanText.match(/\d+/g) || []).map(Number);
        if (text.includes('$') || text.includes('pokut')) {
            return { min: 1, max: Math.max(...nums) || 999999, type: 'fine' };
        }
        let min = cleanText.includes('od ') ? (nums[0] || 1) : 1;
        return { min: min, max: Math.max(...nums) || 1, type: 'jail' };
    }

    async function load() {
        try {
            const res = await fetch('tresty.html?v=' + Date.now());
            const html = await res.text();
            const doc = new DOMParser().parseFromString(html, 'text/html');
            laws = Array.from(doc.querySelectorAll('.law-item')).map(item => ({
                title: item.getAttribute('data-title'),
                subs: Array.from(item.querySelectorAll('.sub-line')).map(line => {
                    const text = line.innerText;
                    return {
                        html: line.innerHTML, fullText: text,
                        valJ: line.getAttribute('data-fix-jail') || "",
                        valF: line.getAttribute('data-fix-fine') || "",
                        limits: parseLimits(text),
                        licW: text.toUpperCase().includes("ZBROJNÍ"), licD: text.toUpperCase().includes("ŘIDIČSKÝ")
                    };
                })
            }));
            render();
        } catch (e) { console.error("Chyba:", e); }
    }

    function render() {
        const container = document.getElementById('lawsContainer');
        const search = document.getElementById('searchInput').value.toLowerCase();
        container.innerHTML = laws.filter(l => l.title.toLowerCase().includes(search)).map((law, lIdx) => `
            <div style="background:var(--bg-panel); border:1px solid var(--border); margin-bottom:12px; border-radius:8px; overflow:hidden;">
                <div style="padding:15px; background:#1c1f24; color:var(--accent); font-weight:900; cursor:pointer;" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">${law.title}</div>
                <div style="padding:15px; display:none;">
                    ${law.subs.map((sub, sIdx) => `
                        <div class="row">
                            <div class="law-description">${sub.html}</div>
                            <input type="number" class="input-box" id="j_${lIdx}_${sIdx}" value="${sub.valJ}" placeholder="JAIL">
                            <input type="number" class="input-box" id="f_${lIdx}_${sIdx}" value="${sub.valF}" placeholder="FINE">
                            <button onclick="add(${lIdx}, ${sIdx})" style="background:var(--accent); border:none; padding:10px 15px; border-radius:4px; font-weight:900; cursor:pointer;">+</button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function add(lIdx, sIdx) {
        const sub = laws[lIdx].subs[sIdx];
        const jail = parseInt(document.getElementById(`j_${lIdx}_${sIdx}`).value) || 0;
        const fine = parseInt(document.getElementById(`f_${lIdx}_${sIdx}`).value) || 0;
        if (jail <= 0 && fine <= 0) return;
        protocol.push({ id: Date.now(), title: laws[lIdx].title, fullText: sub.fullText, jail, fine, licW: sub.licW, licD: sub.licD });
        updateProtocol();
    }

    function updateProtocol() {
        const list = document.getElementById('caseEntries');
        list.innerHTML = protocol.map((p) => `
            <div class="protocol-card">
                <div style="color:var(--accent); font-weight:900; font-size:14px;">${p.title}</div>
                <div style="font-size:11px; color:#777; margin-top:4px;">${p.fullText}</div>
                <div style="margin-top:10px; font-weight:900; font-size:20px; color:var(--accent);">${p.jail > 0 ? p.jail+' J' : ''} ${p.fine > 0 ? '$'+p.fine.toLocaleString() : ''}</div>
                <button onclick="remove(${p.id})" style="position:absolute; right:15px; top:15px; background:none; border:none; color:var(--danger); cursor:pointer; font-size:20px;">✕</button>
            </div>
        `).join('');
        document.getElementById('warnWeapon').style.display = protocol.some(p => p.licW) ? 'block' : 'none';
        document.getElementById('warnDriver').style.display = protocol.some(p => p.licD) ? 'block' : 'none';
        document.getElementById('sumJail').innerText = protocol.reduce((a, b) => a + b.jail, 0);
        document.getElementById('sumFine').innerText = protocol.reduce((a, b) => a + b.fine, 0).toLocaleString();
    }

    function remove(id) { protocol = protocol.filter(x => x.id !== id); updateProtocol(); }
    load();
</script>
</body>
</html>
