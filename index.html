<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP MDT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h1>SASP TERMINÁL</h1>
        <p style="color:#555; letter-spacing:5px;">SECURE ACCESS GATEWAY</p>
        <button class="login-btn" onclick="login()">VSTOUPIT DO EVIDENCE</button>
    </div>
</div>

<div id="customAlert" class="alert-overlay">
    <div class="alert-box">
        <div style="color:var(--red); font-size:12px; font-weight:bold; letter-spacing:2px; margin-bottom:10px;">KONTROLA ZÁKONNOSTI</div>
        <div class="alert-icon">🚫</div>
        <h2>NADMAXIMÁLNÍ TREST</h2>
        <p id="alertMsg" style="color:#aaa; font-size:18px;"></p>
        <div class="alert-footer">
            <button class="btn-red" onclick="closeAlert()">ANO</button>
            <button class="btn-black" onclick="closeAlert()">NE</button>
        </div>
    </div>
</div>

<div class="search-bar">
    <input type="text" id="searchInput" placeholder="Hledat v zákoníku (např. §7)..." oninput="render()">
</div>

<div id="mainApp">
    <div id="leftPanel">
        <div id="lawsContainer"></div>
    </div>
    <div id="rightPanel">
        <div style="padding:20px 20px 0 20px;"><h3 style="margin:0; letter-spacing:1px;">AKTUÁLNÍ PŘÍPAD</h3></div>
        <div id="caseEntries"></div>
        <div class="summary-box">
            <div class="total-text">CELKEM: <span><span class="total-val" id="sumJail">0</span> J | <span style="color:#2ecc71;">$</span><span style="color:#2ecc71;" id="sumFine">0</span></span></div>
            <button class="new-case-btn" onclick="newCase()">NOVÝ PŘÍPAD</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
