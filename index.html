<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP MDT - TERMINÁL v145</title>
    <style>
        :root {
            --bg-main: #0a0b0d; --bg-panel: #111317;
            --accent: #ffcc00; --danger: #ff4444;
            --warning: #ff8800; --info: #00aaff; --fine: #00ff88; --border: #202124;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100vh; background: var(--bg-main); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #loginOverlay { position: fixed; width: 100%; height: 100%; background: var(--bg-main); z-index: 200000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #mainApp { display: none; height: 100vh; width: 100%; }
        
        #leftPanel { flex: 3; border-right: 2px solid var(--border); display: flex; flex-direction: column; }
        #rightPanel { flex: 1.2; min-width: 420px; background: var(--bg-panel); display: flex; flex-direction: column; }
        
        .law-category-header { padding: 15px; background: #1c1f24; color: var(--accent); font-weight: 900; cursor: pointer; border-bottom: 1px solid var(--border); text-transform: uppercase; }
        .law-content { padding: 15px; display: none; background: #111317; }
        
        .row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #1a1c20; }
        .law-description { flex: 1; font-size: 14px; color: #eee; }
        
        .input-box { background: #000; border: 1px solid #333; color: var(--accent) !important; font-weight: 900; padding: 10px; width: 85px; text-align: center; border-radius: 4px; font-size: 16px; outline: none; }
        .input-box:disabled { opacity: 0.05; cursor: not-allowed; }
        
        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 300000; display: none; justify-content: center; align-items: center; }
        .modal-box { background: #1a0000; border: 4px solid var(--danger); padding: 40px; border-radius: 15px; text-align: center; width: 500px; }
        
        .protocol-card { background: #000; border: 1px solid var(--border); margin: 10px; padding: 15px; border-radius: 8px; position: relative; border-left: 4px solid var(--accent); }
        .status-bar { color: white; padding: 14px; font-weight: 900; text-align: center; margin: 5px 10px; border-radius: 4px; display: none; text-transform: uppercase; font-size: 12px; }
        .add-btn { background: var(--accent); border: none; padding: 10px 20px; font-weight: 900; cursor: pointer; border-radius: 4px; color: #000; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <h1 style="color: var(--accent); letter-spacing: 5px; margin-bottom: 30px;">SASP MDT v145</h1>
    <button onclick="login()" style="background:var(--accent); padding:20px 60px; font-weight:900; border:none; border-radius:5px; cursor:pointer; font-size: 18px;">VSTOUPIT</button>
</div>

<div id="modalOverlay">
    <div class="modal-box">
        <h3 id="modalStep" style="color: var(--danger); margin: 0; font-size: 12px; letter-spacing: 2px;">KROK 1/2</h3>
        <h1 id="modalIcon" style="font-size: 50px; margin: 10px 0;">⚠️</h1>
        <h2 id="modalTitle" style="color:#fff; text-transform: uppercase;">VAROVÁNÍ</h2>
        <p id="modalMsg" style="color:#ccc; font-size: 16px; margin-bottom: 25px;"></p>
        <button id="modalNextBtn" style="background:var(--danger); color:#fff; border:none; padding:12px 25px; font-weight: 900; cursor:pointer; border-radius: 5px; margin-right:10px;">POTVRDIT</button>
        <button onclick="closeModal()" style="background:transparent; color:#fff; border:1px solid #444; padding:12px 25px; font-weight: 900; cursor:pointer; border-radius: 5px;">ZRUŠIT</button>
    </div>
</div>

<div id="mainApp">
    <div id="leftPanel">
        <div style="padding:15px; background: #16181d; border-bottom: 2px solid var(--border);">
            <input type="text" id="searchInput" placeholder="Hledat..." oninput="render()" style="width:100%; padding:12px; background:#000; border:1px solid #444; color:#fff; border-radius:5px;">
        </div>
        <div id="lawsContainer" style="overflow-y:auto; padding:15px;"></div>
    </div>

    <div id="rightPanel">
        <div id="courtAlert" class="status-bar" style="background:var(--warning); color:#000;">⚖️ KONZULTACE SZ / SOUD</div>
        <div id="maxAlert" class="status-bar" style="background:var(--danger);">🚫 LIMIT 80 LET PŘEKROČEN</div>
        <div id="caseEntries" style="flex-grow:1; overflow-y:auto;"></div>
        <div style="padding:20px; background:#000; border-top:2px solid var(--border);">
            <div style="display:flex; justify-content:space-between; font-size:20px; font-weight:900;">
                <span>CELKEM:</span>
                <span><span id="sumJail" style="color:var(--info)">0</span> J | <span id="sumFine" style="color:var(--fine)">0</span> $</span>
            </div>
            <button onclick="resetCase()" style="width:100%; margin-top:12px; padding:15px; background:var(--info); color:white; border:none; font-weight:900; border-radius:5px; cursor:pointer;">NOVÝ PŘÍPAD</button>
        </div>
    </div>
</div>

<script>
    let laws = [];
    let protocol = [];

    function login() { document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('mainApp').style.display = 'flex'; load(); }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

    async function load() {
        const res = await fetch('tresty.html?v=' + Date.now());
        const html = await res.text();
        const doc = new DOMParser().parseFromString(html, 'text/html');
        laws = Array.from(doc.querySelectorAll('.law-item')).map(item => ({
            id: item.id || 'L' + Math.random().toString(36).substr(2, 5),
            title: item.getAttribute('data-title'),
            subs: Array.from(item.querySelectorAll('.sub-line')).map(line => {
                const txt = line.innerText.toLowerCase();
                const maxMatch = txt.match(/(?:do|až)\s+(\d+)\s+let/i);
                return {
                    html: line.innerHTML, text: line.innerText,
                    hasJ: txt.includes("let") || txt.includes("roku") || txt.includes("doživotí"),
                    hasF: txt.includes("pokut") || txt.includes("$") || txt.includes("peněžit"),
                    isLife: txt.includes("doživotí"),
                    isLicense: line.innerText.includes("ODEBRAT"),
                    maxJ: maxMatch ? parseInt(maxMatch[1]) : 999
                };
            })
        }));
        render();
    }

    function render() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        document.getElementById('lawsContainer').innerHTML = laws.filter(l => l.title.toLowerCase().includes(search)).map((law, lIdx) => `
            <div class="law-item">
                <div class="law-category-header" onclick="const c=this.nextElementSibling; c.style.display=c.style.display==='block'?'none':'block'">${law.title}</div>
                <div class="law-content">
                    ${law.subs.map((sub, sIdx) => `
                        <div class="row">
                            <div class="law-description">${sub.html}</div>
                            <input type="number" class="input-box" id="j_${lIdx}_${sIdx}" value="" placeholder="皿" ${!sub.hasJ?'disabled':''}>
                            <input type="number" class="input-box" id="f_${lIdx}_${sIdx}" value="" placeholder="$" ${!sub.hasF?'disabled':''}>
                            <button class="add-btn" onclick="runCheck(${lIdx}, ${sIdx})">+</button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function runCheck(lIdx, sIdx) {
        const sub = laws[lIdx].subs[sIdx];
        const valJ = parseInt(document.getElementById(`j_${lIdx}_${sIdx}`).value) || 0;

        // 1. Priorita: Odebrání průkazu
        if (sub.isLicense) {
            showModal("ODEBRÁNÍ PRŮKAZU", "Tento čin vyžaduje odebrání průkazu. Je hotovo?", () => {
                showModal("ADMINISTRACE", "Byl záznam zapsán v kartě občana?", () => {
                    // Po průkazech kontrolujeme, jestli tam náhodou není i doživotí
                    if(sub.isLife || valJ >= 99) checkLife(lIdx, sIdx); else checkMax(lIdx, sIdx);
                }, "2/2");
            }, "1/2");
        } 
        // 2. Priorita: Doživotí (pokud nebyl průkaz)
        else if (sub.isLife || valJ >= 99) {
            checkLife(lIdx, sIdx);
        }
        // 3. Priorita: Horní hranice
        else {
            checkMax(lIdx, sIdx);
        }
    }

    function checkLife(lIdx, sIdx) {
        showModal("DOŽIVOTNÍ TREST", "Udělujete doživotí. Máte k tomu oprávnění?", () => {
            showModal("SOUDNÍ SOUHLAS", "Byl u rozsudku přítomen SZ nebo Soudce?", () => add(lIdx, sIdx), "2/2");
        }, "1/2");
    }

    function checkMax(lIdx, sIdx) {
        const sub = laws[lIdx].subs[sIdx];
        const valJ = parseInt(document.getElementById(`j_${lIdx}_${sIdx}`).value) || 0;
        if (valJ > sub.maxJ && sub.maxJ !== 999) {
            showModal("PŘEKROČENÍ HRANICE", `Trest ${valJ} let je nad hranicí zákona (${sub.maxJ} let). Vyžaduje SZ/Soud.`, () => add(lIdx, sIdx), "SOUD");
        } else {
            add(lIdx, sIdx);
        }
    }

    function showModal(title, msg, onNext, step = "1/2") {
        document.getElementById('modalStep').innerText = "KROK " + step;
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMsg').innerText = msg;
        document.getElementById('modalOverlay').style.display = 'flex';
        document.getElementById('modalNextBtn').onclick = onNext;
    }

    function add(lIdx, sIdx) {
        const j = parseInt(document.getElementById(`j_${lIdx}_${sIdx}`).value) || 0;
        const f = parseInt(document.getElementById(`f_${lIdx}_${sIdx}`).value) || 0;
        protocol.push({ 
            id: Date.now(), title: laws[lIdx].title, sub: laws[lIdx].subs[sIdx].text, 
            jail: j, fine: f, isLife: laws[lIdx].subs[sIdx].isLife || j >= 99 
        });
        update(); closeModal();
    }

    function update() {
        let totalJ = 0; let hasLife = false;
        protocol.forEach(p => { if(p.isLife) hasLife = true; else totalJ += p.jail; });
        document.getElementById('caseEntries').innerHTML = protocol.map(p => `
            <div class="protocol-card">
                <span style="color:var(--accent); font-weight:900; font-size:12px;">${p.title}</span>
                <div style="font-size:18px; font-weight:900; margin:5px 0;">${p.isLife?'DOŽIVOTÍ':p.jail+' J'} | $${p.fine.toLocaleString()}</div>
                <button onclick="protocol=protocol.filter(x=>x.id!==${p.id});update()" style="position:absolute; right:10px; top:10px; background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
            </div>
        `).join('');
        document.getElementById('courtAlert').style.display = (totalJ > 20 || hasLife) ? 'block' : 'none';
        document.getElementById('maxAlert').style.display = totalJ > 80 ? 'block' : 'none';
        document.getElementById('sumJail').innerText = hasLife ? 'INF' : totalJ;
        document.getElementById('sumFine').innerText = protocol.reduce((a,b)=>a+b.fine, 0).toLocaleString();
    }

    function resetCase() { protocol = []; update(); }
</script>
</body>
</html>
