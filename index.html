<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP MDT - TERMINÁL v100</title>
    <style>
        :root {
            --bg-main: #0a0b0d; --bg-panel: #14161a;
            --accent: #ffcc00; --danger: #ff4444;
            --info: #00aaff; --fine: #00ff88; --border: #202124;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100vh; background: var(--bg-main); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* LOGIN SCREEN */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1c20 0%, #0a0b0d 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; transition: opacity 0.5s ease-out; }
        .login-box { text-align: center; background: var(--bg-panel); padding: 50px; border-radius: 15px; border: 1px solid var(--border); box-shadow: 0 0 50px rgba(0,0,0,0.5); width: 400px; position: relative; }
        .btn-enter { background: var(--accent); color: #000; border: none; padding: 15px 40px; font-size: 18px; font-weight: 900; border-radius: 5px; cursor: pointer; text-transform: uppercase; margin-bottom: 30px; }
        .login-credits { border-top: 1px solid var(--border); padding-top: 20px; margin-top: 10px; font-size: 11px; color: #555; }

        /* HLAVNÍ APLIKACE */
        #mainApp { display: none; height: 100vh; width: 100%; }
        .app-container { display: flex; height: 100%; width: 100%; }
        #lawsContainer b, #lawsContainer strong { color: var(--accent) !important; font-weight: bold; }
        #leftPanel { flex: 3; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        #rightPanel { flex: 1.2; min-width: 420px; background: var(--bg-panel); display: flex; flex-direction: column; }
        
        .header-bar { padding: 20px; background: var(--bg-panel); border-bottom: 1px solid var(--border); }
        #lawsContainer { padding: 20px; overflow-y: auto; flex-grow: 1; }
        .law-card { background: var(--bg-panel); border: 1px solid var(--border); margin-bottom: 10px; border-radius: 6px; }
        .law-header { padding: 15px; cursor: pointer; color: var(--accent); font-weight: 800; display: flex; justify-content: space-between; }
        .law-content { display: none; padding: 10px 20px; background: #0f1114; }
        .law-card.active .law-content { display: block; }
        .row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #1a1c20; }
        .input-box { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; width: 85px; text-align: center; border-radius: 4px; font-weight: bold; outline: none; }
        
        .protocol-item { background: #000; padding: 15px; border-radius: 8px; border-left: 4px solid var(--info); margin: 10px; position: relative; border: 1px solid var(--border); }
        .lic-alert-item { color: var(--danger); background: rgba(255, 68, 68, 0.1); border: 1px solid var(--danger); padding: 5px; border-radius: 4px; font-size: 11px; font-weight: 900; margin-top: 5px; text-align: center; }
        .warning-bar { color: white; padding: 10px; border-radius: 4px; font-weight: 900; text-align: center; margin: 5px 10px; display: none; animation: pulse-red 0.8s infinite alternate; font-size: 13px; }
        .warn-driver { background: #ff6600; }
        .warn-weapon { background: var(--danger); }
        @keyframes pulse-red { from { opacity: 1; } to { opacity: 0.8; } }
        .summary-box { padding: 20px; background: #000; border-top: 1px solid var(--border); }
        #customAlert { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--danger); color: white; padding: 30px 60px; border-radius: 10px; z-index: 10000; display: none; font-weight: 900; border: 3px solid #fff; text-align: center; }
        .mdt-credits { padding: 10px 20px; font-size: 10px; color: #444; text-align: center; border-top: 1px solid #1a1c20; background: #0a0b0d; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <h1 style="color:var(--accent); margin-bottom: 5px;">SASP TERMINÁL</h1>
        <p style="color:#666; margin-bottom: 40px; letter-spacing: 2px; font-size: 12px;">OFFICIAL EVIDENCE SYSTEM</p>
        <button class="btn-enter" onclick="enterApp()">Vstoupit do Evidence</button>
        <div class="login-credits">
            <b>DEVELOPED BY:</b> Gemini AI & MDT Team<br>
            <span style="font-size: 9px; opacity: 0.6;">© 2026 DEPARTMENT OF JUSTICE</span>
        </div>
    </div>
</div>

<div id="mainApp">
    <div id="customAlert">⚠️ CHYBA!</div>
    <div class="app-container">
        <div id="leftPanel">
            <div class="header-bar">
                <h2 style="margin:0; color:var(--accent);">TRESTNÍ ZÁKONÍK</h2>
                <input type="text" id="searchInput" placeholder="Hledat..." oninput="render()" style="width:100%; margin-top:15px; background:#000; border:1px solid var(--border); color:#fff; padding:12px; border-radius:4px;">
            </div>
            <div id="lawsContainer"></div>
        </div>

        <div id="rightPanel">
            <div style="padding:20px; font-weight:800; color:var(--accent); border-bottom:1px solid var(--border);">AKTIVNÍ PROTOKOL</div>
            <div id="caseEntries" style="flex-grow:1; overflow-y:auto;"></div>
            
            <div id="warnDriver" class="warning-bar warn-driver">⚠️ ODEBRAT ŘIDIČSKÝ PRŮKAZ</div>
            <div id="warnWeapon" class="warning-bar warn-weapon">⚠️ ODEBRAT ZBROJNÍ PRŮKAZ</div>
            
            <div class="summary-box">
                <div style="display:flex; justify-content:space-between; font-weight:900; margin-bottom:15px;">
                    <span>CELKEM:</span>
                    <span><span id="sumJail" style="color:var(--info)">0</span> let | <span id="sumFine" style="color:var(--fine)">0</span> $</span>
                </div>
                <button onclick="save()" style="width:100%; padding:15px; background:var(--info); color:white; border:none; border-radius:4px; font-weight:900; cursor:pointer;">ULOŽIT PROTOKOL</button>
            </div>
            <div class="mdt-credits">SASP MDT SYSTEM v10.0 | <b>Gemini AI & MDT Team</b></div>
        </div>
    </div>
</div>

<script>
    let laws = [];
    let protocol = [];

    function enterApp() {
        document.getElementById('loginScreen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            load();
        }, 500);
    }

    function showAlert(msg) {
        const el = document.getElementById('customAlert');
        el.innerText = "⚠️ " + msg;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    async function load() {
        try {
            const res = await fetch('tresty.html?v=' + Date.now());
            const html = await res.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            laws = Array.from(doc.querySelectorAll('.law-item')).map(item => ({
                title: item.getAttribute('data-title'),
                subs: Array.from(item.querySelectorAll('.sub-line')).map(line => {
                    const text = line.innerText.toUpperCase();
                    const fixJ = line.getAttribute('data-fix-jail');
                    const fixF = line.getAttribute('data-fix-fine');
                    let minJ = 0, maxJ = 999, minF = 0, maxF = 0;

                    const jM = text.match(/(?:SAZBA|OD|DO|AŽ|V ROZMEZÍ)\s*([\d\s-]+)\s*LET/i);
                    if (jM) {
                        const n = jM[1].match(/\d+/g).map(Number);
                        if (n.length >= 2) { minJ = n[0]; maxJ = n[1]; } else { maxJ = n[0]; }
                    }
                    const fM = text.match(/(?:POKUTOU|VÝŠI|OD|DO|AŽ|V ROZMEZÍ)\s*([\d.\s-]+)\s*\$/i);
                    if (fM) {
                        const n = fM[1].replace(/\./g, '').match(/\d+/g).map(Number);
                        if (n.length >= 2) { minF = n[0]; maxF = n[1]; } else { maxF = n[0]; }
                    }

                    return {
                        html: line.innerHTML, fullText: line.innerText,
                        letter: (line.innerText.match(/^[a-z]\)/i) || [""])[0],
                        valJ: fixJ || "", valF: fixF || "",
                        isFixJ: fixJ !== null, isFixF: fixF !== null,
                        minJ, maxJ, minF, maxF,
                        licW: text.includes("ZBROJNÍ"), licD: text.includes("ŘIDIČSKÝ")
                    };
                })
            }));
            render();
        } catch (e) { console.error(e); }
    }

    function render() {
        const container = document.getElementById('lawsContainer');
        const search = document.getElementById('searchInput').value.toLowerCase();
        container.innerHTML = laws.filter(l => l.title.toLowerCase().includes(search)).map((law, lIdx) => `
            <div class="law-card">
                <div class="law-header" onclick="this.parentElement.classList.toggle('active')">
                    <span>${law.title}</span><span>▼</span>
                </div>
                <div class="law-content">
                    ${law.subs.map((sub, sIdx) => `
                        <div class="row">
                            <div style="flex:1; font-size:12px;">${sub.html}</div>
                            <input type="number" class="input-box" id="j_${lIdx}_${sIdx}" value="${sub.valJ}" placeholder="Let" ${sub.isFixJ ? 'disabled value="FIX"' : ''}>
                            <input type="number" class="input-box" id="f_${lIdx}_${sIdx}" value="${sub.valF}" placeholder="$" ${sub.isFixF ? 'disabled value="FIX"' : ''}>
                            <button onclick="add(${lIdx}, ${sIdx})" style="background:var(--accent); border:none; padding:8px 12px; border-radius:4px; font-weight:900; cursor:pointer;">+</button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function add(lIdx, sIdx) {
        const sub = laws[lIdx].subs[sIdx];
        let jail = parseInt(document.getElementById(`j_${lIdx}_${sIdx}`).value) || 0;
        let fine = parseInt(document.getElementById(`f_${lIdx}_${sIdx}`).value) || 0;

        if (!sub.isFixJ) {
            if (jail < sub.minJ) { showAlert(`MINIMUM: ${sub.minJ} LET`); return; }
            if (jail > sub.maxJ) { showAlert(`MAXIMUM: ${sub.maxJ} LET`); return; }
        }
        if (!sub.isFixF && sub.maxF > 0) {
            if (fine < sub.minF) { showAlert(`MINIMUM: $${sub.minF.toLocaleString()}`); return; }
            if (fine > sub.maxF) { showAlert(`MAXIMUM: $${sub.maxF.toLocaleString()}`); return; }
        }

        protocol.push({
            id: Date.now(), title: laws[lIdx].title, letter: sub.letter, fullText: sub.fullText,
            jail, fine, minJ: sub.minJ, maxJ: sub.maxJ, minF: sub.minF, maxF: sub.maxF,
            isFixJ: sub.isFixJ, isFixF: sub.isFixF, licW: sub.licW, licD: sub.licD
        });
        updateProtocol();
    }

    function updateProtocol() {
        const list = document.getElementById('caseEntries');
        list.innerHTML = protocol.map((p, idx) => `
            <div class="protocol-item">
                <div style="color:var(--accent); font-weight:900; font-size:13px;">${p.title} ${p.letter}</div>
                <div style="font-size: 11px; color: #bbb; margin: 5px 0;">${p.fullText}</div>
                <div class="proto-inputs">
                    <input type="number" class="input-box" value="${p.jail}" ${p.isFixJ ? 'readonly' : ''} onchange="edit(${idx}, 'jail', this.value)">
                    <input type="number" class="input-box" value="${p.fine}" ${p.isFixF ? 'readonly' : ''} onchange="edit(${idx}, 'fine', this.value)">
                </div>
                ${p.licD ? '<div class="lic-alert-item">⚠ ODEBRAT ŘIDIČSKÝ PRŮKAZ</div>' : ''}
                ${p.licW ? '<div class="lic-alert-item" style="border-color:#ff4444; color:#ff4444">⚠ ODEBRAT ZBROJNÍ PRŮKAZ</div>' : ''}
                <button onclick="remove(${p.id})" style="position:absolute; right:10px; top:10px; background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold;">✕</button>
            </div>
        `).join('');

        document.getElementById('warnDriver').style.display = protocol.some(p => p.licD) ? 'block' : 'none';
        document.getElementById('warnWeapon').style.display = protocol.some(p => p.licW) ? 'block' : 'none';
        document.getElementById('sumJail').innerText = protocol.reduce((a, b) => a + b.jail, 0);
        document.getElementById('sumFine').innerText = protocol.reduce((a, b) => a + b.fine, 0).toLocaleString();
    }

    // --- OPRAVENÁ FUNKCE EDITACE ---
    function edit(idx, type, val) {
        let v = parseInt(val) || 0;
        const p = protocol[idx];
        
        if (type === 'jail' && !p.isFixJ) {
            if (v < p.minJ) { showAlert(`OPRAVENO: Zákon vyžaduje MIN ${p.minJ} let.`); v = p.minJ; }
            if (v > p.maxJ) { showAlert(`OPRAVENO: Zákon dovoluje MAX ${p.maxJ} let.`); v = p.maxJ; }
        }
        if (type === 'fine' && !p.isFixF && p.maxF > 0) {
            if (v < p.minF) { showAlert(`OPRAVENO: Zákon vyžaduje MIN $${p.minF.toLocaleString()}.`); v = p.minF; }
            if (v > p.maxF) { showAlert(`OPRAVENO: Zákon dovoluje MAX $${p.maxF.toLocaleString()}.`); v = p.maxF; }
        }
        
        protocol[idx][type] = v;
        updateProtocol();
    }

    function remove(id) { protocol = protocol.filter(x => x.id !== id); updateProtocol(); }
    function save() { alert("Uloženo."); protocol = []; updateProtocol(); }
</script>
</body>
</html>
