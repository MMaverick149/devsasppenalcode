<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP MDT - TERMINÁL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="customAlert" class="alert-overlay">
    <div class="alert-box">
        <div class="alert-header">KONTROLA ZÁKONNOSTI</div>
        <div class="alert-icon">🚫</div>
        <h2>NADMAXIMÁLNÍ TREST</h2>
        <p id="alertMsg"></p>
        <div class="alert-footer">
            <button class="btn-red" onclick="closeAlert()">ANO</button>
            <button class="btn-black" onclick="closeAlert()">NE</button>
        </div>
    </div>
</div>

<div class="search-bar" style="padding: 10px 20px; background: #000;">
    <input type="text" id="searchInput" placeholder="Hledat v zákoníku..." oninput="render()" style="background:transparent; border:1px solid #333; color:#fff; padding:5px; width:200px;">
</div>

<div id="mainApp">
    <div id="leftPanel" style="flex:3; overflow-y:auto; padding:20px;">
        <div id="lawsContainer"></div>
    </div>

    <div id="rightPanel">
        <h3 style="letter-spacing:1px; margin-bottom:20px;">AKTUÁLNÍ PŘÍPAD</h3>
        <div id="caseEntries"></div>
        
        <div class="summary-box">
            <div class="total-text">
                CELKEM: <span><span class="total-val" id="sumJail">0</span> J | <span class="total-val-f" id="sumFine">$0</span></span>
            </div>
            <button class="new-case-btn" onclick="newCase()">NOVÝ PŘÍPAD</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
