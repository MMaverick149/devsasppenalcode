<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP MDT - TERMINÁL v104</title>
    <style>
        :root {
            --bg-main: #0a0b0d; --bg-panel: #14161a;
            --accent: #ffcc00; --danger: #ff4444;
            --info: #00aaff; --fine: #00ff88; --border: #202124;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100vh; background: var(--bg-main); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* PULZUJÍCÍ MODÁLNÍ VAROVÁNÍ */
        #modalOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 100000; display: none;
            justify-content: center; align-items: center;
        }
        .modal-box {
            background: #1a0000; border: 4px solid var(--danger); border-radius: 15px;
            padding: 40px; width: 450px; text-align: center;
            box-shadow: 0 0 50px rgba(255, 68, 68, 0.4);
            animation: pulse-border 1.5s infinite;
        }
        @keyframes pulse-border {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 68, 68, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 60px rgba(255, 68, 68, 0.7); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 68, 68, 0.4); }
        }
        .btn-confirm {
            background: var(--danger); color: white; border: none; padding: 15px 30px;
            font-weight: 900; border-radius: 5px; cursor: pointer; margin-top: 20px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        #mainApp { display: flex; height: 100vh; width: 100%; }
        #leftPanel { flex: 3; border-right: 2px solid var(--border); display: flex; flex-direction: column; }
        #rightPanel { flex: 1.2; min-width: 420px; background: var(--bg-panel); display: flex; flex-direction: column; }
        
        #lawsContainer { padding: 20px; overflow-y: auto; flex-grow: 1; }
        .law-card { background: var(--bg-panel); border: 1px solid var(--border); margin-bottom: 10px; border-radius: 6px; }
        .law-header { padding: 15px; cursor: pointer; color: var(--accent); font-weight: 800; display: flex; justify-content: space-between; font-size: 18px; }
        .law-content { display: none; padding: 15px; background: #0f1114; }
        .law-card.active .law-content { display: block; }
        
        .row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid #1a1c20; }
        
        /* ŽLUTÉ PÍSMO V POLÍČKÁCH */
        .input-box { 
            background: #000; border: 1px solid var(--border); 
            color: var(--accent) !important; /* Vynucená žlutá */
            padding: 12px 5px; width: 90px; text-align: center; border-radius: 4px; 
            font-weight: 900; font-size: 16px; outline: none;
        }
        .input-box::placeholder { color: #444; font-weight: 400; font-size: 12px; }
        .input-box:disabled { border: 1.5px solid var(--danger); opacity: 0.9; cursor: not-allowed; background: #1a0505; }

        .protocol-item { background: #000; padding: 15px; border-radius: 8px; border-left: 4px solid var(--info); margin: 10px; position: relative; border: 1px solid var(--border); }
        .summary-box { padding: 20px; background: #000; border-top: 1px solid var(--border); }
        .warning-bar { color: white; padding: 10px; border-radius: 4px; font-weight: 900; text-align: center; margin: 5px 10px; display: none; }
    </style>
</head>
<body>

<div id="modalOverlay">
    <div class="modal-box">
        <h1 style="color: var(--danger); margin: 0; font-size: 50px;">⚠️</h1>
        <h2 style="margin: 10px 0; color: #fff;">POZOR!</h2>
        <p id="modalMsg" style="color: #ccc; line-height: 1.5;"></p>
        <button class="btn-confirm" onclick="closeModal()">Beru na vědomí</button>
    </div>
</div>

<div id="mainApp">
    <div id="leftPanel">
        <div style="padding:20px; background: var(--bg-panel); border-bottom: 1px solid var(--border);">
            <h2 style="margin:0; color:var(--accent);">SASP TRESTNÍ ZÁKONÍK</h2>
            <input type="text" id="searchInput" placeholder="Hledat..." oninput="render()" style="width:100%; margin-top:10px; background:#000; border:1px solid var(--border); color:#fff; padding:10px;">
        </div>
        <div id="lawsContainer"></div>
    </div>

    <div id="rightPanel">
        <div style="padding:20px; font-weight:800; color:var(--accent); border-bottom:1px solid var(--border);">AKTIVNÍ PROTOKOL</div>
        <div id="caseEntries" style="flex-grow:1; overflow-y:auto;"></div>
        
        <div id="warnDriver" class="warning-bar" style="background:#ff6600">⚠️ ODEBRAT ŘIDIČSKÝ PRŮKAZ</div>
        <div id="warnWeapon" class="warning-bar" style="background:var(--danger)">⚠️ ODEBRAT ZBROJNÍ PRŮKAZ</div>
        
        <div class="summary-box">
            <div style="display:flex; justify-content:space-between; font-weight:900; margin-bottom:15px; font-size: 18px;">
                <span>CELKEM:</span>
                <span><span id="sumJail" style="color:var(--info)">0</span> Jail | <span id="sumFine" style="color:var(--fine)">0</span> Fine</span>
            </div>
            <button onclick="location.reload()" style="width:100%; padding:15px; background:var(--info); color:white; border:none; font-weight:900; cursor:pointer;">NOVÝ PŘÍPAD</button>
        </div>
    </div>
</div>

<script>
    let laws = [];
    let protocol = [];

    function showModal(msg) {
        document.getElementById('modalMsg').innerText = msg;
        document.getElementById('modalOverlay').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

    function extractNums(text, type) {
        let t = text.replace(/\./g, '').toUpperCase();
        let nums = (t.match(/\d+/g) || []).map(Number);
        if (type === 'FINE') {
            if (!t.includes('$') && !t.includes('POKUT')) return { min: 0, max: 0 };
            return { min: nums.length > 1 ? Math.min(...nums) : 0, max: Math.max(...nums) || 999999 };
        } else {
            let j = nums.filter(n => n < 101);
            return { min: j.length > 1 ? Math.min(...j) : (t.includes("1 ROKU") ? 1 : 0), max: Math.max(...j) || 0 };
        }
    }

    async function load() {
        try {
            const res = await fetch('tresty.html?v=' + Date.now());
            const html = await res.text();
            const doc = new DOMParser().parseFromString(html, 'text/html');
            laws = Array.from(doc.querySelectorAll('.law-item')).map(item => ({
                title: item.getAttribute('data-title'),
                subs: Array.from(item.querySelectorAll('.sub-line')).map(line => {
                    const text = line.innerText;
                    const rJ = extractNums(text, 'JAIL');
                    const rF = extractNums(text, 'FINE');
                    return {
                        html: line.innerHTML, fullText: text,
                        valJ: line.getAttribute('data-fix-jail') || "",
                        valF: line.getAttribute('data-fix-fine') || "",
                        isFixJ: line.getAttribute('data-fix-jail') !== null,
                        isFixF: line.getAttribute('data-fix-fine') !== null,
                        minJ: rJ.min, maxJ: rJ.max, minF: rF.min, maxF: rF.max,
                        licW: text.toUpperCase().includes("ZBROJNÍ"), licD: text.toUpperCase().includes("ŘIDIČSKÝ")
                    };
                })
            }));
            render();
        } catch (e) { console.error(e); }
    }

    function render() {
        const container = document.getElementById('lawsContainer');
        const search = document.getElementById('searchInput').value.toLowerCase();
        container.innerHTML = laws.filter(l => l.title.toLowerCase().includes(search)).map((law, lIdx) => `
            <div class="law-card">
                <div class="law-header" onclick="this.parentElement.classList.toggle('active')">
                    <span>${law.title}</span><span>▼</span>
                </div>
                <div class="law-content">
                    ${law.subs.map((sub, sIdx) => `
                        <div class="row">
                            <div style="flex:1; font-size:13px; padding-right:10px;">${sub.html}</div>
                            <input type="number" class="input-box" id="j_${lIdx}_${sIdx}" value="${sub.valJ}" placeholder="Jail" ${sub.isFixJ ? 'disabled' : ''}>
                            <input type="number" class="input-box" id="f_${lIdx}_${sIdx}" value="${sub.valF}" placeholder="Fine" ${sub.isFixF ? 'disabled' : ''}>
                            <button onclick="add(${lIdx}, ${sIdx})" style="background:var(--accent); border:none; padding:12px; border-radius:4px; font-weight:900; cursor:pointer;">+</button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function add(lIdx, sIdx) {
        const sub = laws[lIdx].subs[sIdx];
        let jail = parseInt(document.getElementById(`j_${lIdx}_${sIdx}`).value) || 0;
        let fine = parseInt(document.getElementById(`f_${lIdx}_${sIdx}`).value) || 0;

        if (!sub.isFixJ && (jail < sub.minJ || jail > sub.maxJ)) {
            showModal(`PORUŠENÍ ZÁKONA!\n\nU tohoto paragrafu je sazba v rozmezí ${sub.minJ} až ${sub.maxJ} let.\nZadaná hodnota ${jail} let je nepřípustná.`);
            return;
        }
        if (!sub.isFixF && sub.maxF > 0 && (fine < sub.minF || fine > sub.maxF)) {
            showModal(`CHYBNÁ VÝŠE POKUTY!\n\nZákon povoluje v tomto případě pokutu maximálně do výše $${sub.maxF.toLocaleString()}.`);
            return;
        }

        protocol.push({
            id: Date.now(), title: laws[lIdx].title, fullText: sub.fullText,
            jail, fine, minJ: sub.minJ, maxJ: sub.maxJ, minF: sub.minF, maxF: sub.maxF,
            licW: sub.licW, licD: sub.licD
        });
        updateProtocol();
    }

    function updateProtocol() {
        const list = document.getElementById('caseEntries');
        list.innerHTML = protocol.map((p, idx) => `
            <div class="protocol-item">
                <div style="color:var(--accent); font-weight:900; font-size:14px;">${p.title}</div>
                <div style="font-size: 11px; color: #777; margin: 5px 0;">${p.fullText}</div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <input type="number" class="input-box" value="${p.jail}" onchange="edit(${idx}, 'jail', this.value)">
                    <input type="number" class="input-box" value="${p.fine}" onchange="edit(${idx}, 'fine', this.value)">
                </div>
                <button onclick="remove(${p.id})" style="position:absolute; right:10px; top:10px; background:none; border:none; color:var(--danger); cursor:pointer; font-size:20px;">✕</button>
            </div>
        `).join('');

        document.getElementById('warnDriver').style.display = protocol.some(p => p.licD) ? 'block' : 'none';
        document.getElementById('warnWeapon').style.display = protocol.some(p => p.licW) ? 'block' : 'none';
        document.getElementById('sumJail').innerText = protocol.reduce((a, b) => a + b.jail, 0);
        document.getElementById('sumFine').innerText = protocol.reduce((a, b) => a + b.fine, 0).toLocaleString();
    }

    function edit(idx, type, val) {
        let v = parseInt(val) || 0;
        const p = protocol[idx];
        if (type === 'jail' && (v < p.minJ || v > p.maxJ)) { showModal(`Mimo zákonnou sazbu ${p.minJ}-${p.maxJ} let!`); v = p.minJ; }
        protocol[idx][type] = v;
        updateProtocol();
    }

    function remove(id) { protocol = protocol.filter(x => x.id !== id); updateProtocol(); }
    load();
</script>
</body>
</html>
