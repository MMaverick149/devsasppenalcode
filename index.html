<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASP Terminál</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginScreen">
        <h1 style="color:var(--accent); letter-spacing: 5px; margin: 0;">SASP TERMINÁL</h1>
        <p style="color:#444; font-size: 10px; margin-bottom: 40px; letter-spacing: 2px;">SECURE ACCESS GATEWAY</p>
        <button class="login-btn" onclick="enterEvidence()">VSTOUPIT DO EVIDENCE</button>
        <p style="position: absolute; bottom: 20px; color: #222; font-size: 11px;">© 2026 SASP Nathaniel Hartman</p>
    </div>

    <div id="mainContent" class="container">
        <div class="main-side">
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-bar" placeholder="Hledat v zákoníku (např. §7)..." oninput="render()">
            </div>
            <div id="lawsContainer"></div>
        </div>
        
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>AKTUÁLNÍ PŘÍPAD</h3>
            </div>
            
            <div id="caseEntries" class="case-list">
                </div>
            
            <div class="sidebar-footer">
                <div class="summary">
                    <div class="sum-row">
                        <span>CELKEM:</span>
                        <span class="sum-val"><span id="sumJail">0</span> J | $<span id="sumFine">0</span></span>
                    </div>
                </div>
                <button class="new-case-btn" onclick="newCase()">NOVÝ PŘÍPAD</button>
            </div>
        </div>
    </div>

    <div id="customAlert" class="alert-overlay" style="display: none;">
        <div class="alert-box">
            <div class="alert-icon">🚫</div>
            <h2 id="alertTitle">VAROVÁNÍ</h2>
            <p id="alertMsg"></p>
            <button onclick="closeAlert()">ROZUMÍM</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
