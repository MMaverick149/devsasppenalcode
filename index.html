<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP MDT - TERMINÁL v103</title>
    <style>
        :root {
            --bg-main: #0a0b0d; --bg-panel: #14161a;
            --accent: #ffcc00; --danger: #ff4444;
            --info: #00aaff; --fine: #00ff88; --border: #202124;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100vh; background: var(--bg-main); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* ALERTY VE STŘEDU OBRAZOVKY */
        #customAlert { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--danger); color: white; padding: 30px 50px; border-radius: 10px; 
            z-index: 100000; display: none; font-weight: 900; font-size: 20px;
            box-shadow: 0 0 100px rgba(0,0,0,0.8); border: 3px solid #fff; text-align: center;
        }

        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1c20 0%, #0a0b0d 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; }
        .login-box { text-align: center; background: var(--bg-panel); padding: 50px; border-radius: 15px; border: 1px solid var(--border); width: 400px; }
        .btn-enter { background: var(--accent); color: #000; border: none; padding: 15px 40px; font-size: 18px; font-weight: 900; border-radius: 5px; cursor: pointer; text-transform: uppercase; }

        #mainApp { display: none; height: 100vh; width: 100%; }
        .app-container { display: flex; height: 100%; width: 100%; }
        #leftPanel { flex: 3; border-right: 2px solid var(--border); display: flex; flex-direction: column; }
        #rightPanel { flex: 1.2; min-width: 420px; background: var(--bg-panel); display: flex; flex-direction: column; }
        
        .header-bar { padding: 20px; background: var(--bg-panel); border-bottom: 1px solid var(--border); }
        #lawsContainer { padding: 20px; overflow-y: auto; flex-grow: 1; }
        .law-card { background: var(--bg-panel); border: 1px solid var(--border); margin-bottom: 10px; border-radius: 6px; }
        .law-header { padding: 15px; cursor: pointer; color: var(--accent); font-weight: 800; display: flex; justify-content: space-between; font-size: 18px; }
        .law-content { display: none; padding: 15px; background: #0f1114; }
        .law-card.active .law-content { display: block; }
        
        .row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid #1a1c20; }
        .input-label { font-size: 10px; color: #555; display: block; margin-bottom: 2px; text-align: center; }
        
        .input-box { background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; width: 85px; text-align: center; border-radius: 4px; font-weight: bold; outline: none; }
        .input-box:focus { border-color: var(--accent); }
        .input-box:disabled { border: 1px solid var(--danger); color: var(--danger); opacity: 0.8; cursor: not-allowed; }

        .protocol-item { background: #000; padding: 15px; border-radius: 8px; border-left: 4px solid var(--info); margin: 10px; position: relative; border: 1px solid var(--border); }
        .warning-bar { color: white; padding: 10px; border-radius: 4px; font-weight: 900; text-align: center; margin: 5px 10px; display: none; font-size: 13px; }
        .warn-driver { background: #ff6600; }
        .warn-weapon { background: var(--danger); }
        
        .summary-box { padding: 20px; background: #000; border-top: 1px solid var(--border); }
        .mdt-credits { padding: 10px; font-size: 10px; color: #444; text-align: center; background: #0a0b0d; }
    </style>
</head>
<body>

<div id="customAlert">⚠️ CHYBA!</div>

<div id="loginScreen">
    <div class="login-box">
        <h1 style="color:var(--accent);">SASP TERMINÁL</h1>
        <button class="btn-enter" onclick="enterApp()">Vstoupit do Evidence</button>
    </div>
</div>

<div id="mainApp">
    <div class="app-container">
        <div id="leftPanel">
            <div class="header-bar">
                <h2 style="margin:0; color:var(--accent);">TRESTNÍ ZÁKONÍK</h2>
                <input type="text" id="searchInput" placeholder="Hledat paragraf..." oninput="render()" style="width:100%; margin-top:15px; background:#000; border:1px solid var(--border); color:#fff; padding:12px; border-radius:4px;">
            </div>
            <div id="lawsContainer"></div>
        </div>

        <div id="rightPanel">
            <div style="padding:20px; font-weight:800; color:var(--accent); border-bottom:1px solid var(--border);">AKTIVNÍ PROTOKOL</div>
            <div id="caseEntries" style="flex-grow:1; overflow-y:auto;"></div>
            
            <div id="warnDriver" class="warning-bar warn-driver">⚠️ ODEBRAT ŘIDIČSKÝ PRŮKAZ</div>
            <div id="warnWeapon" class="warning-bar warn-weapon">⚠️ ODEBRAT ZBROJNÍ PRŮKAZ</div>
            
            <div class="summary-box">
                <div style="display:flex; justify-content:space-between; font-weight:900; margin-bottom:15px; font-size: 18px;">
                    <span>CELKEM:</span>
                    <span><span id="sumJail" style="color:var(--info)">0</span> Jail | <span id="sumFine" style="color:var(--fine)">0</span> Fine</span>
                </div>
                <button onclick="save()" style="width:100%; padding:15px; background:var(--info); color:white; border:none; border-radius:4px; font-weight:900; cursor:pointer;">ULOŽIT PROTOKOL</button>
            </div>
            <div class="mdt-credits">SASP MDT | <b>Gemini AI</b> | v103</div>
        </div>
    </div>
</div>

<script>
    let laws = [];
    let protocol = [];

    function enterApp() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        load();
    }

    function showAlert(msg) {
        const el = document.getElementById('customAlert');
        el.innerText = msg;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    // --- AGRESIVNÍ PARSER ČÍSEL ---
    function extractMinMax(text, type) {
        // Vyčistíme text od teček v tisících a získáme jen čísla
        let cleanText = text.replace(/\./g, '');
        let numbers = cleanText.match(/\d+/g);
        
        if (!numbers) return { min: 0, max: 999 };

        let vals = numbers.map(Number);
        
        // Pokud text obsahuje $, bereme jen čísla, která jsou blízko znaku $ nebo slova pokuta
        // Pro zjednodušení: Pokud hledáme Fine (pokutu) a v textu je $, bereme nejvyšší čísla
        if (type === 'FINE') {
            if (!text.includes('$') && !text.toUpperCase().includes('POKUT')) return { min: 0, max: 0 };
            return { min: vals.length > 1 ? Math.min(...vals) : 0, max: Math.max(...vals) };
        } else {
            // Hledáme Jail (roky) - obvykle menší čísla než pokuty
            let jailVals = vals.filter(v => v < 100); // Roky málokdy bývají nad 100
            if (jailVals.length === 0) return { min: 0, max: 0 };
            return { min: jailVals.length > 1 ? Math.min(...jailVals) : 0, max: Math.max(...jailVals) };
        }
    }

    async function load() {
        try {
            const res = await fetch('tresty.html?v=' + Date.now());
            const html = await res.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            laws = Array.from(doc.querySelectorAll('.law-item')).map(item => ({
                title: item.getAttribute('data-title'),
                subs: Array.from(item.querySelectorAll('.sub-line')).map(line => {
                    const text = line.innerText;
                    const rJ = extractMinMax(text, 'JAIL');
                    const rF = extractMinMax(text, 'FINE');

                    return {
                        html: line.innerHTML,
                        fullText: text,
                        letter: (text.match(/^[a-z]\)/i) || [""])[0],
                        valJ: line.getAttribute('data-fix-jail') || "",
                        valF: line.getAttribute('data-fix-fine') || "",
                        isFixJ: line.getAttribute('data-fix-jail') !== null,
                        isFixF: line.getAttribute('data-fix-fine') !== null,
                        minJ: rJ.min, maxJ: rJ.max,
                        minF: rF.min, maxF: rF.max,
                        licW: text.toUpperCase().includes("ZBROJNÍ"),
                        licD: text.toUpperCase().includes("ŘIDIČSKÝ")
                    };
                })
            }));
            render();
        } catch (e) { console.error("Chyba načítání:", e); }
    }

    function render() {
        const container = document.getElementById('lawsContainer');
        const search = document.getElementById('searchInput').value.toLowerCase();
        container.innerHTML = laws.filter(l => l.title.toLowerCase().includes(search)).map((law, lIdx) => `
            <div class="law-card">
                <div class="law-header" onclick="this.parentElement.classList.toggle('active')">
                    <span>${law.title}</span><span>▼</span>
                </div>
                <div class="law-content">
                    ${law.subs.map((sub, sIdx) => `
                        <div class="row">
                            <div style="flex:1; font-size:13px;">${sub.html}</div>
                            <div>
                                <span class="input-label">JAIL</span>
                                <input type="number" class="input-box" id="j_${lIdx}_${sIdx}" value="${sub.valJ}" placeholder="${sub.minJ}-${sub.maxJ}" ${sub.isFixJ ? 'disabled' : ''}>
                            </div>
                            <div>
                                <span class="input-label">FINE</span>
                                <input type="number" class="input-box" id="f_${lIdx}_${sIdx}" value="${sub.valF}" placeholder="max ${sub.maxF}" ${sub.isFixF ? 'disabled' : ''}>
                            </div>
                            <button onclick="add(${lIdx}, ${sIdx})" style="background:var(--accent); border:none; padding:10px 15px; border-radius:4px; font-weight:900; cursor:pointer; margin-top:12px;">+</button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function add(lIdx, sIdx) {
        const sub = laws[lIdx].subs[sIdx];
        let jail = parseInt(document.getElementById(`j_${lIdx}_${sIdx}`).value) || 0;
        let fine = parseInt(document.getElementById(`f_${lIdx}_${sIdx}`).value) || 0;

        // Kontrola limitů
        if (!sub.isFixJ) {
            if (jail < sub.minJ) { showAlert(`MINIMUM JE ${sub.minJ} LET!`); return; }
            if (jail > sub.maxJ) { showAlert(`MAXIMUM JE ${sub.maxJ} LET!`); return; }
        }
        if (!sub.isFixF && sub.maxF > 0) {
            if (fine < sub.minF) { showAlert(`MINIMÁLNÍ FINE JE $${sub.minF}`); return; }
            if (fine > sub.maxF) { showAlert(`MAXIMÁLNÍ FINE JE $${sub.maxF}`); return; }
        }

        protocol.push({
            id: Date.now(), title: laws[lIdx].title, letter: sub.letter, fullText: sub.fullText,
            jail, fine, minJ: sub.minJ, maxJ: sub.maxJ, minF: sub.minF, maxF: sub.maxF,
            isFixJ: sub.isFixJ, isFixF: sub.isFixF, licW: sub.licW, licD: sub.licD
        });
        updateProtocol();
    }

    function updateProtocol() {
        const list = document.getElementById('caseEntries');
        list.innerHTML = protocol.map((p, idx) => `
            <div class="protocol-item">
                <div style="color:var(--accent); font-weight:900;">${p.title} ${p.letter}</div>
                <div style="font-size: 11px; color: #777; margin: 5px 0;">${p.fullText}</div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <input type="number" class="input-box" value="${p.jail}" onchange="edit(${idx}, 'jail', this.value)">
                    <input type="number" class="input-box" value="${p.fine}" onchange="edit(${idx}, 'fine', this.value)">
                </div>
                <button onclick="remove(${p.id})" style="position:absolute; right:10px; top:10px; background:none; border:none; color:var(--danger); cursor:pointer; font-size:18px;">✕</button>
            </div>
        `).join('');

        document.getElementById('warnDriver').style.display = protocol.some(p => p.licD) ? 'block' : 'none';
        document.getElementById('warnWeapon').style.display = protocol.some(p => p.licW) ? 'block' : 'none';
        document.getElementById('sumJail').innerText = protocol.reduce((a, b) => a + b.jail, 0);
        document.getElementById('sumFine').innerText = protocol.reduce((a, b) => a + b.fine, 0).toLocaleString();
    }

    function edit(idx, type, val) {
        let v = parseInt(val) || 0;
        const p = protocol[idx];
        if (type === 'jail' && (v < p.minJ || v > p.maxJ)) { showAlert(`Mimo rozsah ${p.minJ}-${p.maxJ}`); v = v < p.minJ ? p.minJ : p.maxJ; }
        if (type === 'fine' && p.maxF > 0 && (v < p.minF || v > p.maxF)) { showAlert(`Mimo rozsah Fine`); v = v < p.minF ? p.minF : p.maxF; }
        protocol[idx][type] = v;
        updateProtocol();
    }

    function remove(id) { protocol = protocol.filter(x => x.id !== id); updateProtocol(); }
    function save() { showAlert("PROTOKOL ULOŽEN"); protocol = []; updateProtocol(); }
</script>
</body>
</html>
