<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Detail záznamu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-dark: #0b0e14; 
            --sidebar-bg: #151921; 
            --card-bg: #1c212b; 
            --accent-blue: #4a9eff; 
            --border: #2d333b; 
            --gold: #ffcc00; /* Výraznější žlutá/zlatá */
            --danger: #f85149; 
            --success: #2ea043; 
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; display: flex; height: 100vh; }
        
        .sidebar { width: 180px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 15px; flex-shrink: 0; }
        .main { flex-grow: 1; padding: 20px 40px; overflow-y: auto; }
        .container-fluid { width: 100%; }

        /* Hlavní nadpis žlutě */
        h2 { font-weight: bold; margin-bottom: 25px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; }

        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 25px; border-radius: 4px; margin-bottom: 20px; }
        
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 25px; margin-bottom: 20px; }
        
        label { color: var(--accent-blue); font-size: 11px; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 8px; }
        
        input, select, textarea { 
            width: 100%; background: #0b0e14; border: 1px solid var(--border); 
            color: white; padding: 12px; border-radius: 3px; font-size: 14px; box-sizing: border-box; 
        }

        /* Systémový záznam */
        .sys-record { border: 1px dashed #444; color: #aaa; font-size: 13px; font-style: italic; min-height: 80px; background: rgba(0,0,0,0.3); padding: 15px; }

        /* Sekce poznámek se žlutým textem a okrajem */
        .notes-card { border-top: 4px solid var(--gold); }
        .notes-header { 
            display: flex; align-items: center; gap: 10px; 
            color: var(--gold); /* Žlutý text nadpisu */
            margin-bottom: 15px; font-weight: bold; text-transform: uppercase; font-size: 14px; 
        }
        
        textarea#case-notes { min-height: 400px; font-family: 'Consolas', monospace; font-size: 15px; border-color: #444; }

        /* Varování přes obrazovku */
        #locked-screen-warning {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(248, 81, 73, 0.15); /* Jemný červený nádech přes vše */
            border: 10px solid var(--danger);
            pointer-events: none; /* Aby se dalo klikat skrz na prohlížení */
            z-index: 9999;
            box-sizing: border-box;
        }
        
        .locked-banner {
            background: var(--danger); color: white; padding: 20px; 
            font-size: 20px; font-weight: bold; text-align: center; 
            margin-bottom: 30px; border-radius: 4px; display: none;
        }

        .btn-row { display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 50px; }
        .btn { border: none; padding: 14px 30px; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .btn-resolve { background: var(--success); color: white; }
        .btn-save { background: var(--accent-blue); color: black; }
    </style>
</head>
<body>

<div id="locked-screen-warning"></div>

<div class="sidebar">
    <a href="index.html" style="color: var(--accent-blue); text-decoration: none; font-size: 12px; font-weight: bold;">
        <i class="fa-solid fa-arrow-left"></i> ZPĚT
    </a>
</div>

<div class="main">
    <div class="container-fluid">
        <div id="locked-msg" class="locked-banner">
            <i class="fa-solid fa-triangle-exclamation"></i> TENTO ZÁZNAM JE UZAVŘEN - POUZE PRO ČTENÍ
        </div>
        
        <h2>Evidence Operativních Prostředků</h2>
        
        <div class="card">
            <div class="grid-3">
                <div><label>Vyšetřující detektiv</label><input type="text" id="det-name"></div>
                <div><label>Hodnost</label>
                    <select id="det-rank">
                        <option>DBI Trainee</option><option>Detective I</option><option>Detective II</option><option>Command</option>
                    </select>
                </div>
                <div><label>Case ID</label><input type="text" id="case-id"></div>
            </div>
            
            <div class="grid-3">
                <div><label>Subjekt (Jméno Příjmení)</label><input type="text" id="sub-name"></div>
                <div><label>Datum narození</label><input type="text" id="sub-dob"></div>
                <div><label>MDT ID</label><input type="text" id="mdt-id"></div>
            </div>

            <div class="grid-3">
                <div style="grid-column: span 2;">
                    <label>Právní kvalifikace (Lze přepisovat tresty)</label>
                    <input list="crimes-list" id="legal-qual" placeholder="Vyberte nebo napište vlastní trestný čin a trest...">
                    <datalist id="crimes-list">
                        <option value="§6 a) Zločin v organizaci (15 let - doživotí)">
                        <option value="§6 b) Zločin v organizaci s naplněním (Doživotí)">
                        <option value="§7 a) Ublížení - neúmyslně zbraní (1-5 let)">
                        <option value="§7 c) Ublížení - úmyslně střelnou zbraní (3-10 let)">
                        <option value="§9 Vražda (Doživotí)">
                        <option value="§11 Pokus o vraždu (20-30 let)">
                        <option value="§18 Loupežné přepadení (10-20 let)">
                    </datalist>
                </div>
                <div>
                    <label>Typ OPP</label>
                    <select id="opp-type">
                        <option>Prověrka majetku a finančních prostředků</option>
                        <option>Sledování osob a věcí</option>
                        <option>Odposlech a záznam</option>
                    </select>
                </div>
            </div>

            <label>Zjištěné skutečnosti (Systémový záznam)</label>
            <textarea class="sys-record" readonly>Na základě prvotního ohledání místa činu bylo zjištěno, že došlo k násilnému trestnému činu...</textarea>

            <label>Doplňující odůvodnění žádosti</label>
            <textarea id="user-note" style="min-height: 80px;" placeholder="Vlastní text..."></textarea>
        </div>

        <div class="card notes-card">
            <div class="notes-header">
                <i class="fa-solid fa-clipboard-list"></i> PRŮBĚŽNÉ POZNÁMKY A OPERATIVNÍ DENÍK
            </div>
            <textarea id="case-notes" placeholder="Zápis vyšetřování..."></textarea>
        </div>

        <div class="btn-row" id="action-buttons">
            <button class="btn btn-save" onclick="saveData('OTEVŘENO')"><i class="fa-solid fa-save"></i> ULOŽIT</button>
            <button class="btn btn-resolve" onclick="saveData('VYŘEŠENO')"><i class="fa-solid fa-check-double"></i> SCHVÁLIT A ARCHIVOVAT</button>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const caseIndex = urlParams.get('id');
    let cases = JSON.parse(localStorage.getItem('lspd_v15_data')) || [];

    if(caseIndex !== null && cases[caseIndex]) {
        let c = cases[caseIndex];
        document.getElementById('det-name').value = c.author || '';
        document.getElementById('case-id').value = c.id || '';
        document.getElementById('sub-name').value = c.subject || '';
        document.getElementById('sub-dob').value = c.dob || '';
        document.getElementById('mdt-id').value = c.mdt || '';
        document.getElementById('legal-qual').value = c.legal || '';
        document.getElementById('opp-type').value = c.opp || '';
        document.getElementById('case-notes').value = c.notes || '';
        document.getElementById('user-note').value = c.note || '';
        
        // Pokud je vyřešeno, zamknout vše a ukázat varování
        if(c.status === 'VYŘEŠENO') {
            document.querySelectorAll('input, select, textarea').forEach(el => el.disabled = true);
            document.getElementById('locked-msg').style.display = 'block';
            document.getElementById('locked-screen-warning').style.display = 'block';
            document.getElementById('action-buttons').style.display = 'none';
        }
    }

    function saveData(status) {
        let entry = {
            id: document.getElementById('case-id').value || '---',
            author: document.getElementById('det-name').value || 'Michala',
            subject: document.getElementById('sub-name').value || '---',
            dob: document.getElementById('sub-dob').value || '',
            mdt: document.getElementById('mdt-id').value || '',
            legal: document.getElementById('legal-qual').value,
            opp: document.getElementById('opp-type').value,
            notes: document.getElementById('case-notes').value,
            note: document.getElementById('user-note').value,
            status: status
        };
        if(caseIndex !== null) cases[caseIndex] = entry; else cases.push(entry);
        localStorage.setItem('lspd_v15_data', JSON.stringify(cases));
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
