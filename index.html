<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP TERMINÁL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginScreen">
        <h1 class="terminal-title">SASP TERMINÁL</h1>
        <button class="login-btn" onclick="enterEvidence()">VSTOUPIT DO EVIDENCE</button>
    </div>

    <div id="mainContent" class="app-container" style="display: none;">
        <nav class="top-nav">
            <input type="text" id="searchInput" placeholder="Hledat v zákoníku..." oninput="render()">
        </nav>

        <div class="content-wrapper">
            <main class="laws-section">
                <div id="lawsContainer"></div>
            </main>

            <aside class="sidebar">
                <div class="sidebar-header">AKTUÁLNÍ PŘÍPAD</div>
                <div id="caseEntries" class="case-list"></div>
                <div class="sidebar-footer">
                    <div class="summary">CELKEM: <span id="sumJail">0</span> J | $<span id="sumFine">0</span></div>
                    <button class="new-case-btn" onclick="newCase()">NOVÝ PŘÍPAD</button>
                </div>
            </aside>
        </div>
    </div>

    <div id="customAlert" class="alert-overlay" style="display: none;">
        <div class="alert-box">
            <div class="alert-header">SASP SYSTÉMOVÁ KONTROLA</div>
            <p id="alertMsg"></p>
            <button class="alert-btn" onclick="closeAlert()">ROZUMÍM</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
