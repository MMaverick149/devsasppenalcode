<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP MDT - TERMINÁL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="search-bar">
    <input type="text" id="searchInput" placeholder="Hledat v zákoníku..." oninput="render()">
</div>

<div id="mainApp">
    <div id="leftPanel">
        <div id="lawsContainer"></div>
    </div>

    <div id="rightPanel">
        <h3 style="margin-top:0; letter-spacing: 1px;">AKTUÁLNÍ PŘÍPAD</h3>
        <div id="caseEntries"></div>
        
        <div class="summary-box">
            <div class="total-line">CELKEM: <span id="sumJail">0</span> J | <span id="sumFine">$0</span></div>
            <button class="new-case-btn" onclick="newCase()">Nový případ</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
