<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP MDT - TERMINÁL v125</title>
    <style>
        :root {
            --bg-main: #0a0b0d; --bg-panel: #111317;
            --accent: #ffcc00; --danger: #ff4444;
            --warning: #ff8800; --info: #00aaff; --fine: #00ff88; --border: #202124;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100vh; background: var(--bg-main); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100000; display: none; justify-content: center; align-items: center; }
        .modal-box { background: #1a0000; border: 4px solid var(--danger); padding: 40px; border-radius: 15px; text-align: center; width: 550px; box-shadow: 0 0 50px rgba(255,0,0,0.4); }

        #mainApp { display: none; height: 100vh; width: 100%; }
        #leftPanel { flex: 3; border-right: 2px solid var(--border); display: flex; flex-direction: column; }
        #rightPanel { flex: 1.2; min-width: 400px; background: var(--bg-panel); display: flex; flex-direction: column; }
        
        .law-category-header { padding: 15px; background: #1c1f24; color: var(--accent) !important; font-weight: 900; cursor: pointer; border-bottom: 1px solid var(--border); text-transform: uppercase; }
        .law-content { padding: 15px; display: none; background: #111317; }
        
        .row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #1a1c20; }
        .law-description { flex: 1; font-size: 15px; color: #fff; }
        .law-description b, .law-description strong { color: var(--accent) !important; font-weight: 900; }
        
        .input-box { background: #000; border: 1px solid #333; color: var(--accent); font-weight: 900; padding: 8px; width: 85px; text-align: center; border-radius: 4px; }
        .input-box:disabled { background: #050505 !important; color: #444 !important; border-color: #111; cursor: not-allowed; }
        
        .protocol-card { background: #000; border: 1px solid var(--border); margin: 10px; padding: 15px; border-radius: 8px; position: relative; }
        .prot-header { color: var(--accent); font-weight: 900; cursor: pointer; display: block; margin-bottom: 5px; font-size: 14px; text-decoration: underline; text-decoration-color: transparent; }
        .prot-header:hover { text-decoration-color: var(--accent); }
        .prot-sub { color: #fff; font-size: 12px; display: block; opacity: 0.8; margin-bottom: 8px; line-height: 1.4; }
        
        .status-bar { color: white; padding: 12px; font-weight: 900; text-align: center; margin: 5px 10px; border-radius: 4px; display: none; text-transform: uppercase; font-size: 11px; }
    </style>
</head>
<body>

<div id="modalOverlay">
    <div class="modal-box">
        <h1 style="font-size: 80px; margin: 0;">🚫</h1>
        <h2 id="modalTitle" style="color:#fff; letter-spacing: 2px;">NEPOVOLENÝ TREST</h2>
        <p id="modalMsg" style="color:#ccc; font-size: 18px; margin-bottom: 30px; line-height: 1.5;"></p>
        <button onclick="closeModal()" style="background:var(--accent); color:#000; border:none; padding:15px 50px; font-weight: 900; cursor:pointer; border-radius:5px; text-transform: uppercase;">Upravit hodnotu</button>
    </div>
</div>

<div id="loginOverlay" style="position:fixed; width:100%; height:100%; background:var(--bg-main); z-index:200; display:flex; justify-content:center; align-items:center;">
    <button onclick="login()" style="background:var(--accent); padding:20px 60px; font-weight:900; border:none; border-radius:5px; cursor:pointer; letter-spacing:2px; font-size: 18px;">VSTOUPIT DO EVIDENCE</button>
</div>

<div id="mainApp">
    <div id="leftPanel">
        <div style="padding:20px; background: #16181d; border-bottom: 2px solid var(--border);">
            <input type="text" id="searchInput" placeholder="Vyhledat v trestním zákoníku..." oninput="render()" style="width:100%; padding:14px; background:#000; border:1px solid #444; color:#fff; border-radius:5px;">
        </div>
        <div id="lawsContainer" style="overflow-y:auto; padding:20px; scroll-behavior: smooth;"></div>
    </div>

    <div id="rightPanel">
        <div style="padding:15px; background:#000; font-size:11px; color:#555; letter-spacing:1px; font-weight: 900;">AKTIVNÍ PROTOKOL PŘÍPADU</div>
        <div id="courtAlert" class="status-bar" style="background:var(--warning); color:#000;">⚖️ NUTNO VOLAT SZ (MINIMÁLNÍ SAZBY > 20J)</div>
        <div id="maxAlert" class="status-bar" style="background:var(--danger);">🚫 PŘEKROČEN LIMIT MDT (80 LET)</div>
        <div id="caseEntries" style="flex-grow:1; overflow-y:auto;"></div>
        
        <div style="padding:25px; background:#000; border-top:2px solid var(--border);">
            <div style="display:flex; justify-content:space-between; font-size:24px; font-weight:900; letter-spacing: 1px;">
                <span>CELKEM:</span>
                <span><span id="sumJail" style="color:var(--info)">0</span> J | <span id="sumFine" style="color:var(--fine)">0</span> $</span>
            </div>
            <button onclick="resetCase()" style="width:100%; margin-top:15px; padding:18px; background:var(--info); color:white; border:none; font-weight:900; border-radius:5px; cursor:pointer; text-transform: uppercase;">Nový případ</button>
        </div>
    </div>
</div>

<script>
    let laws = [];
    let protocol = [];

    function login() { document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('mainApp').style.display = 'flex'; load(); }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    function showAlert(title, msg) { document.getElementById('modalTitle').innerText = title; document.getElementById('modalMsg').innerText = msg; document.getElementById('modalOverlay').style.display = 'flex'; }

    function scrollToLaw(id) {
        const el = document.getElementById(id);
        if(el) {
            el.querySelector('.law-content').style.display = 'block';
            el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }

    // BRUTÁLNÍ PARSER (Hledá absolutně nejvyšší čísla v řádku)
    function getHardLimits(text) {
        const clean = text.replace(/\./g, '');
        let limits = { jail: 0, fine: 0, minJ: 0, life: clean.toLowerCase().includes("doživotí") };
        
        // Najde nejvyšší číslo u slova "let"
        const jailMatches = clean.match(/(\d+)\s*(?:[-–]|až|do)\s*(\d+)\s*let/);
        if(jailMatches) {
            limits.minJ = parseInt(jailMatches[1]);
            limits.jail = parseInt(jailMatches[2]);
        } else {
            const singleJail = clean.match(/(\d+)\s*let/);
            if(singleJail) limits.jail = parseInt(singleJail[1]);
        }

        // Najde nejvyšší číslo u symbolu $
        const fineMatches = clean.match(/(\d[\d\s]*)\s*\$/g);
        if(fineMatches) {
            const vals = fineMatches.map(m => parseInt(m.replace(/\D/g, '')));
            limits.fine = Math.max(...vals);
        }
        return limits;
    }

    async function load() {
        const res = await fetch('tresty.html?v=' + Date.now());
        const html = await res.text();
        const doc = new DOMParser().parseFromString(html, 'text/html');
        laws = Array.from(doc.querySelectorAll('.law-item')).map(item => ({
            id: item.id || 'L' + Math.random().toString(36).substr(2, 5),
            title: item.getAttribute('data-title'),
            subs: Array.from(item.querySelectorAll('.sub-line')).map(line => ({
                html: line.innerHTML, text: line.innerText,
                valJ: line.getAttribute('data-fix-jail') || "", valF: line.getAttribute('data-fix-fine') || "",
                isFixJ: line.getAttribute('data-fix-jail') !== null,
                isFixF: line.getAttribute('data-fix-fine') !== null
            }))
        }));
        render();
    }

    function render() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        document.getElementById('lawsContainer').innerHTML = laws.filter(l => l.title.toLowerCase().includes(search)).map((law, lIdx) => `
            <div class="law-item" id="${law.id}" style="margin-bottom:12px; border:1px solid var(--border); border-radius:8px; overflow:hidden;">
                <div class="law-category-header" onclick="const c=this.nextElementSibling; c.style.display=c.style.display==='block'?'none':'block'">${law.title}</div>
                <div class="law-content">
                    ${law.subs.map((sub, sIdx) => `
                        <div class="row">
                            <div class="law-description">${sub.html}</div>
                            <input type="number" class="input-box" id="j_${lIdx}_${sIdx}" value="${sub.valJ}" placeholder="JAIL" ${sub.isFixJ?'disabled':''}>
                            <input type="number" class="input-box" id="f_${lIdx}_${sIdx}" value="${sub.valF}" placeholder="FINE" ${sub.isFixF?'disabled':''}>
                            <button onclick="add(${lIdx}, ${sIdx})" style="background:var(--accent); border:none; padding:10px 18px; font-weight:900; cursor:pointer; border-radius:4px;">+</button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function add(lIdx, sIdx) {
        const sub = laws[lIdx].subs[sIdx];
        const jInput = document.getElementById(`j_${lIdx}_${sIdx}`);
        const fInput = document.getElementById(`f_${lIdx}_${sIdx}`);
        const jail = parseInt(jInput.value) || 0;
        const fine = parseInt(fInput.value) || 0;

        const limits = getHardLimits(sub.text);

        // NEKOMPROMISNÍ VALIDACE
        if (!sub.isFixJ && limits.jail > 0 && jail > limits.jail) {
            return showAlert("PŘEKROČENA SAZBA", `U tohoto činu je maximum ${limits.jail} let. Zadal jsi ${jail} let.`);
        }
        if (!sub.isFixF && limits.fine > 0 && fine > limits.fine) {
            return showAlert("NELEGÁLNÍ POKUTA", `Maximální povolená pokuta je $${limits.fine.toLocaleString()}. Zadal jsi $${fine.toLocaleString()}.`);
        }
        
        if (limits.life) showAlert("POZOR: DOŽIVOTÍ", "Tento paragraf obsahuje doživotní trest. Případ musí převzít Státní zástupce nebo Soud.");

        protocol.push({ 
            id: Date.now(), lawId: laws[lIdx].id, parentTitle: laws[lIdx].title, 
            subText: sub.text, jail, fine, minJ: limits.minJ, life: limits.life 
        });
        updateProtocol();
    }

    function updateProtocol() {
        const totalJ = protocol.reduce((a, b) => a + b.jail, 0);
        const totalMin = protocol.reduce((a, b) => a + b.minJ, 0);

        document.getElementById('caseEntries').innerHTML = protocol.map(p => `
            <div class="protocol-card">
                <span class="prot-header" onclick="scrollToLaw('${p.lawId}')">${p.parentTitle}</span>
                <span class="prot-sub">${p.subText}</span>
                <div style="font-size:24px; font-weight:900;">${p.jail} J | $${p.fine.toLocaleString()}</div>
                <button onclick="remove(${p.id})" style="position:absolute; right:15px; top:15px; background:none; border:none; color:var(--danger); cursor:pointer; font-size:20px;">✕</button>
            </div>
        `).join('');

        document.getElementById('courtAlert').style.display = (totalMin > 20 || protocol.some(p => p.life)) ? 'block' : 'none';
        document.getElementById('maxAlert').style.display = totalJ > 80 ? 'block' : 'none';
        document.getElementById('sumJail').innerText = totalJ;
        document.getElementById('sumFine').innerText = protocol.reduce((a, b) => a + b.fine, 0).toLocaleString();
    }

    function remove(id) { protocol = protocol.filter(x => x.id !== id); updateProtocol(); }
    function resetCase() { protocol = []; updateProtocol(); }
</script>
</body>
</html>
