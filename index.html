<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP MDT - TERMINÁL v136</title>
    <style>
        :root {
            --bg-main: #0a0b0d; --bg-panel: #111317;
            --accent: #ffcc00; --danger: #ff4444;
            --warning: #ff8800; --info: #00aaff; --fine: #00ff88; --border: #202124;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100vh; background: var(--bg-main); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* ŽLUTÉ TUČNÉ PÍSMO - NATVRDO */
        b, strong { color: var(--accent) !important; font-weight: 900; }

        #mainApp { display: flex; height: 100vh; width: 100%; }
        #leftPanel { flex: 3; border-right: 2px solid var(--border); display: flex; flex-direction: column; }
        #rightPanel { flex: 1.2; min-width: 420px; background: var(--bg-panel); display: flex; flex-direction: column; }
        
        .law-category-header { padding: 15px; background: #1c1f24; color: var(--accent) !important; font-weight: 900; cursor: pointer; border-bottom: 1px solid var(--border); text-transform: uppercase; }
        .law-content { padding: 15px; display: none; background: #111317; }
        
        .row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #1a1c20; }
        .law-description { flex: 1; font-size: 14px; color: #eee; line-height: 1.4; }
        
        .input-box { background: #000; border: 1px solid #333; color: var(--accent); font-weight: 900; padding: 10px; width: 90px; text-align: center; border-radius: 4px; font-size: 16px; }
        /* POKUD POLE NEMÁ BÝT POUŽITO, ZMIZÍ */
        .input-box:disabled { background: #000 !important; border: 1px solid #000 !important; color: transparent !important; cursor: not-allowed; pointer-events: none; }
        
        .protocol-card { background: #000; border: 1px solid var(--border); margin: 10px; padding: 15px; border-radius: 8px; position: relative; border-left: 4px solid var(--accent); }
        .prot-header { color: var(--accent); font-weight: 900; cursor: pointer; display: block; margin-bottom: 5px; font-size: 12px; text-transform: uppercase; text-decoration: underline; }
        
        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100000; display: none; justify-content: center; align-items: center; }
        .modal-box { background: #1a0000; border: 4px solid var(--danger); padding: 40px; border-radius: 15px; text-align: center; width: 550px; }
        
        .status-bar { color: white; padding: 14px; font-weight: 900; text-align: center; margin: 5px 10px; border-radius: 4px; display: none; text-transform: uppercase; font-size: 12px; }
    </style>
</head>
<body>

<div id="modalOverlay">
    <div class="modal-box">
        <h1 id="modalIcon" style="font-size: 60px; margin: 0;">⚠️</h1>
        <h2 id="modalTitle" style="color:#fff; text-transform: uppercase;">VAROVÁNÍ</h2>
        <p id="modalMsg" style="color:#ccc; font-size: 18px; margin-bottom: 30px; line-height: 1.6;"></p>
        <div id="modalControls">
            <button id="modalConfirmBtn" style="display:none; background:var(--danger); color:#fff; border:none; padding:15px 30px; font-weight: 900; cursor:pointer; border-radius:5px; margin-right: 10px;">POTVRDIT A POKRAČOVAT</button>
            <button onclick="closeModal()" style="background:var(--accent); color:#000; border:none; padding:15px 30px; font-weight: 900; cursor:pointer; border-radius:5px;">ZAVŘÍT / UPRAVIT</button>
        </div>
    </div>
</div>

<div id="mainApp">
    <div id="leftPanel">
        <div style="padding:20px; background: #16181d; border-bottom: 2px solid var(--border);">
            <input type="text" id="searchInput" placeholder="Hledat v Penal Code..." oninput="render()" style="width:100%; padding:15px; background:#000; border:1px solid #444; color:#fff; border-radius:5px;">
        </div>
        <div id="lawsContainer" style="overflow-y:auto; padding:20px;"></div>
    </div>

    <div id="rightPanel">
        <div id="courtAlert" class="status-bar" style="background:var(--warning); color:#000;">⚖️ KONZULTACE SZ / SOUD</div>
        <div id="maxAlert" class="status-bar" style="background:var(--danger);">🚫 LIMIT 80 LET PŘEKROČEN</div>
        <div id="caseEntries" style="flex-grow:1; overflow-y:auto;"></div>
        <div style="padding:25px; background:#000; border-top:2px solid var(--border);">
            <div style="display:flex; justify-content:space-between; font-size:24px; font-weight:900;">
                <span>CELKEM:</span>
                <span><span id="sumJail" style="color:var(--info)">0</span> J | <span id="sumFine" style="color:var(--fine)">0</span> $</span>
            </div>
            <button onclick="resetCase()" style="width:100%; margin-top:15px; padding:20px; background:var(--info); color:white; border:none; font-weight:900; border-radius:5px; cursor:pointer;">NOVÝ PŘÍPAD</button>
        </div>
    </div>
</div>

<script>
    let laws = [];
    let protocol = [];
    let pendingAction = null;

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; document.getElementById('modalConfirmBtn').style.display = 'none'; }
    
    function showAlert(title, msg, isCritical = false, onConfirm = null) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMsg').innerText = msg;
        document.getElementById('modalIcon').innerText = isCritical ? "🛑" : "⚠️";
        
        if (onConfirm) {
            const btn = document.getElementById('modalConfirmBtn');
            btn.style.display = 'inline-block';
            btn.onclick = () => { onConfirm(); closeModal(); };
        }
        
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function getHardLimits(text) {
        const clean = text.replace(/\./g, '').toLowerCase();
        
        // ANALÝZA POLÍ
        const hasJail = clean.includes("let") || clean.includes("roku") || clean.includes("roků") || clean.includes("svobod") || clean.includes("doživotí");
        const hasFine = clean.includes("pokut") || clean.includes("$") || clean.includes("peněžit");
        
        let limits = { jailMin: 0, jailMax: 0, fineMax: 0, life: clean.includes("doživotí"), hasJail, hasFine, isOptional: clean.includes("nebo") };
        
        const rangeMatch = clean.match(/od\s+(\d+)\s+(?:let|roku|roků)?\s*(?:do|až)\s+(\d+)\s+let/i) || clean.match(/(\d+)\s*[-–]\s*(\d+)\s+let/i);
        if (rangeMatch) { limits.jailMin = parseInt(rangeMatch[1]); limits.jailMax = parseInt(rangeMatch[2]); }
        else {
            const singleMatch = clean.match(/(\d+)\s+let/i);
            if (singleMatch) { limits.jailMax = parseInt(singleMatch[1]); }
        }
        
        const fineMatches = clean.match(/do\s*(\d[\d\s]*)\s*\$/i) || clean.match(/(\d[\d\s]*)\s*\$/g);
        if(fineMatches) {
            const vals = Array.isArray(fineMatches) ? fineMatches.map(m => parseInt(m.replace(/\D/g, ''))) : [parseInt(fineMatches[1].replace(/\D/g, ''))];
            limits.fineMax = Math.max(...vals);
        }
        return limits;
    }

    async function load() {
        const res = await fetch('tresty.html?v=' + Date.now());
        const html = await res.text();
        const doc = new DOMParser().parseFromString(html, 'text/html');
        laws = Array.from(doc.querySelectorAll('.law-item')).map(item => ({
            id: item.id || 'L' + Math.random().toString(36).substr(2, 5),
            title: item.getAttribute('data-title'),
            subs: Array.from(item.querySelectorAll('.sub-line')).map(line => {
                const lim = getHardLimits(line.innerText);
                return {
                    html: line.innerHTML, text: line.innerText,
                    valJ: line.getAttribute('data-fix-jail') || "", valF: line.getAttribute('data-fix-fine') || "",
                    hasJail: lim.hasJail, hasFine: lim.hasFine
                };
            })
        }));
        render();
    }

    function render() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        document.getElementById('lawsContainer').innerHTML = laws.filter(l => l.title.toLowerCase().includes(search)).map((law, lIdx) => `
            <div class="law-item" id="${law.id}" style="margin-bottom:12px; border:1px solid var(--border); border-radius:8px; overflow:hidden;">
                <div class="law-category-header" onclick="const c=this.nextElementSibling; c.style.display=c.style.display==='block'?'none':'block'">${law.title}</div>
                <div class="law-content">
                    ${law.subs.map((sub, sIdx) => `
                        <div class="row">
                            <div class="law-description">${sub.html}</div>
                            <input type="number" class="input-box" id="j_${lIdx}_${sIdx}" value="${sub.valJ}" placeholder="J" ${!sub.hasJail?'disabled':''}>
                            <input type="number" class="input-box" id="f_${lIdx}_${sIdx}" value="${sub.valF}" placeholder="$" ${!sub.hasFine?'disabled':''}>
                            <button onclick="add(${lIdx}, ${sIdx})" style="background:var(--accent); border:none; padding:10px 20px; font-weight:900; cursor:pointer; border-radius:4px;">+</button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function add(lIdx, sIdx) {
        const sub = laws[lIdx].subs[sIdx];
        const jail = parseInt(document.getElementById(`j_${lIdx}_${sIdx}`).value) || 0;
        const fine = parseInt(document.getElementById(`f_${lIdx}_${sIdx}`).value) || 0;
        const lim = getHardLimits(sub.text);

        if (jail === 0 && fine === 0) return;

        // Kontrola licencí
        if (sub.text.includes("ODEBRAT")) {
            showAlert("ODEBRÁNÍ PRŮKAZU", `Tento čin obsahuje povinnost ODEBRAT průkaz. Opravdu jste ho odebrali a chcete čin přidat?`, false, () => executeAdd(lIdx, sIdx, jail, fine, lim));
        } else {
            executeAdd(lIdx, sIdx, jail, fine, lim);
        }
    }

    function executeAdd(lIdx, sIdx, jail, fine, lim) {
        if (lim.jailMin > 0 && jail < lim.jailMin && !(lim.isOptional && fine > 0)) return showAlert("CHYBA", `Minimální délka trestu je ${lim.jailMin} let.`);
        if (lim.jailMax > 0 && jail > lim.jailMax && !lim.life) return showAlert("CHYBA", `Maximální délka trestu je ${lim.jailMax} let. Pro vyšší trest volejte SZ.`);
        if (lim.fineMax > 0 && fine > lim.fineMax) return showAlert("CHYBA", `Maximální pokuta je $${lim.fineMax.toLocaleString()}.`);

        protocol.push({ id: Date.now(), lawId: laws[lIdx].id, title: laws[lIdx].title, sub: laws[lIdx].subs[sIdx].text, jail, fine, minJ: lim.jailMin, life: lim.life });
        updateProtocol();
    }

    function updateProtocol() {
        const totalJ = protocol.reduce((a, b) => a + b.jail, 0);
        const totalMin = protocol.reduce((a, b) => a + b.minJ, 0);
        document.getElementById('caseEntries').innerHTML = protocol.map(p => `
            <div class="protocol-card">
                <span class="prot-header" onclick="document.getElementById('${p.lawId}').scrollIntoView({behavior:'smooth'})">${p.title}</span>
                <span style="font-size:11px; opacity:0.6; display:block;">${p.sub}</span>
                <div style="font-size:24px; font-weight:900; margin-top:5px;">${p.jail} J | $${p.fine.toLocaleString()}</div>
                <button onclick="remove(${p.id})" style="position:absolute; right:15px; top:15px; background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
            </div>
        `).join('');
        document.getElementById('courtAlert').style.display = (totalMin > 20 || protocol.some(p => p.life)) ? 'block' : 'none';
        document.getElementById('maxAlert').style.display = totalJ > 80 ? 'block' : 'none';
        document.getElementById('sumJail').innerText = totalJ;
        document.getElementById('sumFine').innerText = protocol.reduce((a, b) => a + b.fine, 0).toLocaleString();
    }

    function remove(id) { protocol = protocol.filter(x => x.id !== id); updateProtocol(); }
    function resetCase() { protocol = []; updateProtocol(); }

    load();
</script>
</body>
</html>
