<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASP TERMINÁL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginScreen">
        <h1 class="terminal-title">SASP TERMINÁL</h1>
        <p class="terminal-subtitle">SECURE ACCESS GATEWAY</p>
        <button class="login-btn" onclick="enterEvidence()">VSTOUPIT DO EVIDENCE</button>
        <p class="copyright">© 2026 SASP Nathaniel Hartman</p>
    </div>

    <div id="mainContent" class="app-container" style="display: none;">
        <nav class="top-nav">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Hledat v zákoníku (např. §7)..." oninput="render()">
            </div>
        </nav>

        <div class="content-wrapper">
            <main class="laws-section">
                <div id="lawsContainer"></div>
            </main>

            <aside class="sidebar">
                <div class="sidebar-header">AKTUÁLNÍ PŘÍPAD</div>
                <div id="caseEntries" class="case-list"></div>
                <div class="sidebar-footer">
                    <div class="total-summary">
                        CELKEM: <span id="sumJail">0</span> J | $<span id="sumFine">0</span>
                    </div>
                    <button class="action-btn" onclick="newCase()">NOVÝ PŘÍPAD</button>
                </div>
            </aside>
        </div>
    </div>

    <div id="customAlert" class="alert-overlay" style="display: none;">
        <div class="alert-box">
            <div class="alert-header">KONTROLA ZÁKONNOSTI</div>
            <p id="alertMsg"></p>
            <button class="alert-btn" onclick="closeAlert()">ROZUMÍM</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
