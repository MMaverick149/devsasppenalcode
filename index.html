<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP MDT - TERMINÁL v153</title>
    <style>
        :root {
            --bg-main: #0a0b0d; --bg-panel: #111317;
            --accent: #ffcc00; --danger: #ff4444;
            --warning: #ff8800; --info: #00aaff; --fine: #00ff88; --border: #2c2e33;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100vh; background: var(--bg-main); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        b, strong, .highlight { color: var(--accent) !important; font-weight: 900; }

        #loginOverlay { position: fixed; width: 100%; height: 100%; background: var(--bg-main); z-index: 200000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #mainApp { display: none; height: 100vh; width: 100%; }
        
        #leftPanel { flex: 3; border-right: 2px solid var(--border); display: flex; flex-direction: column; }
        #rightPanel { flex: 1.2; min-width: 420px; background: var(--bg-panel); display: flex; flex-direction: column; }
        
        .law-item { margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; background: #16181d; overflow: hidden; }
        .law-category-header { padding: 15px; background: #1c1f24; color: var(--accent); font-weight: 900; cursor: pointer; border-bottom: 1px solid var(--border); text-transform: uppercase; }
        
        .law-content { padding: 10px; display: none; background: #111317; }
        .row { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid #1a1c20; }
        .law-description { flex: 1; font-size: 14px; color: #eee; line-height: 1.4; }
        
        .input-box { background: #000; border: 1px solid #444; color: var(--accent) !important; font-weight: 900; padding: 10px; width: 85px; text-align: center; border-radius: 4px; font-size: 16px; outline: none; }
        
        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 300000; display: none; justify-content: center; align-items: center; }
        .modal-box { background: #1a0000; border: 4px solid var(--danger); padding: 40px; border-radius: 15px; text-align: center; width: 550px; }
        
        /* Protokol karta - upravena pro dlouhý text */
        .protocol-card { background: #000; border: 1px solid var(--border); margin-bottom: 12px; padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent); position: relative; }
        .sub-full-text { display: block; font-size: 13px; color: #ccc; margin-top: 8px; line-height: 1.3; border-top: 1px solid #222; padding-top: 8px; }
        .badge { font-size: 11px; background: var(--danger); color: white; padding: 3px 8px; border-radius: 4px; font-weight: 900; margin-left: 8px; vertical-align: middle; }
        
        .status-bar { color: white; padding: 14px; font-weight: 900; text-align: center; margin: 5px 10px; border-radius: 4px; display: none; text-transform: uppercase; }
        .add-btn { background: var(--accent); border: none; padding: 10px 20px; font-weight: 900; cursor: pointer; border-radius: 4px; color: #000; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <h1 style="color: var(--accent); letter-spacing: 5px; margin-bottom: 30px;">SASP MDT v153</h1>
    <button onclick="login()" style="background:var(--accent); padding:20px 60px; font-weight:900; border:none; border-radius:5px; cursor:pointer; font-size: 18px;">VSTOUPIT</button>
</div>

<div id="modalOverlay">
    <div class="modal-box">
        <h3 id="modalStep" style="color: var(--danger); margin: 0; font-size: 12px; letter-spacing: 2px;">SYSTÉM</h3>
        <h1 id="modalIcon" style="font-size: 60px; margin: 15px 0;">⚠️</h1>
        <h2 id="modalTitle" style="color:#fff; text-transform: uppercase;">VAROVÁNÍ</h2>
        <p id="modalMsg" style="color:#ccc; font-size: 17px; margin-bottom: 30px;"></p>
        <button id="modalNextBtn" style="background:var(--danger); color:#fff; border:none; padding:15px 35px; font-weight: 900; cursor:pointer; border-radius: 5px; margin-right:10px;">POTVRDIT</button>
        <button onclick="closeModal()" style="background:transparent; color:#fff; border:1px solid #444; padding:15px 35px; font-weight: 900; cursor:pointer; border-radius: 5px;">ZRUŠIT</button>
    </div>
</div>

<div id="mainApp">
    <div id="leftPanel">
        <div style="padding:15px; background: #16181d; border-bottom: 2px solid var(--border);">
            <input type="text" id="searchInput" placeholder="Hledat..." oninput="render()" style="width:100%; padding:15px; background:#000; border:1px solid #444; color:#fff; border-radius:5px;">
        </div>
        <div id="lawsContainer" style="overflow-y:auto; padding:15px; flex-grow: 1;"></div>
    </div>

    <div id="rightPanel">
        <div id="courtAlert" class="status-bar" style="background:var(--warning); color:#000;">⚖️ SZ / SOUD</div>
        <div id="maxAlert" class="status-bar" style="background:var(--danger);">🚫 LIMIT 80 LET</div>
        <div id="caseEntries" style="flex-grow:1; overflow-y:auto; padding: 10px;"></div>
        <div style="padding:25px; background:#0a0b0d; border-top:2px solid var(--border);">
            <div style="display:flex; justify-content:space-between; font-size:22px; font-weight:900; margin-bottom: 15px;">
                <span>CELKEM:</span>
                <span><span id="sumJail" style="color:var(--info)">0</span> J | <span id="sumFine" style="color:var(--fine)">0</span> $</span>
            </div>
            <button onclick="protocol=[]; update();" style="width:100%; padding:18px; background:var(--info); color:white; border:none; font-weight:900; border-radius:5px; cursor:pointer;">NOVÝ PŘÍPAD</button>
        </div>
    </div>
</div>

<script>
    let laws = [];
    let protocol = [];

    function login() { document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('mainApp').style.display = 'flex'; load(); }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

    async function load() {
        const res = await fetch('tresty.html?v=' + Date.now());
        const html = await res.text();
        const doc = new DOMParser().parseFromString(html, 'text/html');
        
        laws = Array.from(doc.querySelectorAll('.law-item')).map(item => {
            const title = item.getAttribute('data-title');
            let subs = Array.from(item.querySelectorAll('.sub-line')).map(line => parseSub(line.innerText, line.innerHTML));

            if (title.includes('§7')) {
                subs = subs.map(s => {
                    if (s.text.toLowerCase().includes('d)')) {
                        return parseSub(
                            "d) úmyslně a zbraní proti úřední osobě je trestný čin, který se trestá odnětím svobody od 5 let do 15 let. ODEBRAT Zbrojní Průkaz",
                            "d) úmyslně a zbraní proti úřední osobě je trestný čin, který se trestá <b class='highlight'>odnětím svobody od 5 let do 15 let</b>. ODEBRAT Zbrojní Průkaz"
                        );
                    }
                    return s;
                });
            }
            if (title.includes('§11')) {
                subs = [parseSub(
                    "Pokus o vraždu: Plánování či neúspěšně plánovaný a úmyslný pokus o usmrcení jiné osoby je trestný čin, který se trestá odnětím svobody od 25 let po doživotí. ODEBRAT Zbrojní Průkaz",
                    "Plánování či neúspěšně plánovaný a úmyslný pokus o usmrcení jiné osoby je trestný čin, který se trestá <b class='highlight'>odnětím svobody od 25 let po doživotí</b>. ODEBRAT Zbrojní Průkaz"
                )];
            }
            return { id: item.id || 'L' + Math.random().toString(36).substr(2, 5), title: title, subs: subs };
        });
        render();
    }

    function parseSub(raw, html) {
        const txt = raw.toLowerCase();
        const rangeMatch = txt.match(/od\s+(\d+)\s+.*(?:do|až|po)\s+(\d+|doživotí)/i);
        const singleMatch = txt.match(/(?:sazba|do)\s+(\d+)\s+let/i);
        let min = 0; let max = 999;
        if (rangeMatch) { min = parseInt(rangeMatch[1]); max = rangeMatch[2].includes("doživotí") ? 99 : parseInt(rangeMatch[2]); }
        else if (singleMatch) { max = parseInt(singleMatch[1]); }

        return { text: raw, html: html, hasJ: txt.includes("let") || txt.includes("doživotí"), hasF: txt.includes("pokut") || txt.includes("$"), isLife: txt.includes("doživotí"), isZP: raw.includes("Zbrojní"), isRP: raw.includes("Řidičský"), minJ: min, maxJ: max };
    }

    function render() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        document.getElementById('lawsContainer').innerHTML = laws.filter(l => l.title.toLowerCase().includes(search)).map((law, lIdx) => `
            <div class="law-item" id="${law.id}">
                <div class="law-category-header" onclick="toggleLaw(this)">${law.title}</div>
                <div class="law-content">
                    ${law.subs.map((sub, sIdx) => `
                        <div class="row">
                            <div class="law-description">${sub.html}</div>
                            <input type="number" class="input-box" id="j_${lIdx}_${sIdx}" placeholder="皿" ${!sub.hasJ?'disabled':''}>
                            <input type="number" class="input-box" id="f_${lIdx}_${sIdx}" placeholder="$" ${!sub.hasF?'disabled':''}>
                            <button class="add-btn" onclick="checkAll(${lIdx}, ${sIdx})">+</button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function toggleLaw(el) { const c = el.nextElementSibling; c.style.display = (c.style.display === 'block') ? 'none' : 'block'; }

    function checkAll(lIdx, sIdx) {
        const sub = laws[lIdx].subs[sIdx];
        const valJ = parseInt(document.getElementById(`j_${lIdx}_${sIdx}`).value) || 0;
        if (valJ < sub.minJ && valJ !== 0) { showModal("MINIMÁLNÍ SAZBA", `U tohoto činu je minimum ${sub.minJ} let!`, () => closeModal(), "STOP"); return; }
        if (sub.isZP || sub.isRP) { showModal("PRŮKAZY", "Zkontrolujte odebrání průkazů!", () => validateLife(lIdx, sIdx, valJ), "DOKLADY"); } 
        else { validateLife(lIdx, sIdx, valJ); }
    }

    function validateLife(lIdx, sIdx, valJ) {
        const sub = laws[lIdx].subs[sIdx];
        if (sub.isLife || valJ >= 99) { showModal("DOŽIVOTÍ", "Zadejte doživotí. Je přítomen SZ?", () => add(lIdx, sIdx), "SOUD"); }
        else if (valJ > sub.maxJ && sub.maxJ !== 999) { showModal("PŘEKROČENÍ", `Trest je nad limit ${sub.maxJ} let. Vyžaduje SZ!`, () => add(lIdx, sIdx), "SOUD"); }
        else { add(lIdx, sIdx); }
    }

    function showModal(title, msg, onNext, step) {
        document.getElementById('modalStep').innerText = step; document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMsg').innerText = msg; document.getElementById('modalOverlay').style.display = 'flex';
        document.getElementById('modalNextBtn').onclick = onNext;
    }

    function add(lIdx, sIdx) {
        const j = parseInt(document.getElementById(`j_${lIdx}_${sIdx}`).value) || 0;
        const f = parseInt(document.getElementById(`f_${lIdx}_${sIdx}`).value) || 0;
        const sub = laws[lIdx].subs[sIdx];
        protocol.push({ 
            id: Date.now(), lawId: laws[lIdx].id, title: laws[lIdx].title, 
            fullText: sub.text, // Přenášíme úplně celý text
            jail: j, fine: f, isLife: sub.isLife || j >= 99, rp: sub.isRP, zp: sub.isZP 
        });
        update(); closeModal();
    }

    function update() {
        let totalJ = 0; let hasLife = false;
        protocol.forEach(p => { if(p.isLife) hasLife = true; else totalJ += p.jail; });
        document.getElementById('caseEntries').innerHTML = protocol.map(p => `
            <div class="protocol-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <b style="font-size:16px;">${p.title}</b>
                    <div>${p.zp ? '<span class="badge">ZP</span>' : ''}${p.rp ? '<span class="badge">ŘP</span>' : ''}</div>
                </div>
                <span class="sub-full-text">${p.fullText}</span>
                <div style="font-size:22px; font-weight:900; margin-top:12px; color:var(--accent); text-align:right;">
                    ${p.isLife?'DOŽIVOTÍ':p.jail+' LET'} | $${p.fine.toLocaleString()}
                </div>
                <button onclick="protocol=protocol.filter(x=>x.id!==${p.id});update()" style="position:absolute; right:-10px; top:-10px; background:var(--danger); border:none; color:white; width:25px; height:25px; border-radius:50%; cursor:pointer; font-weight:900;">✕</button>
            </div>
        `).join('');
        document.getElementById('courtAlert').style.display = (totalJ > 20 || hasLife) ? 'block' : 'none';
        document.getElementById('maxAlert').style.display = totalJ > 80 ? 'block' : 'none';
        document.getElementById('sumJail').innerText = hasLife ? 'INF' : totalJ;
        document.getElementById('sumFine').innerText = protocol.reduce((a,b)=>a+b.fine, 0).toLocaleString();
    }
</script>
</body>
</html>
